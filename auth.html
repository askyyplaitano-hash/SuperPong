<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>PONG — SIGN IN</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#000;color:#fff;display:flex;justify-content:center;align-items:center;min-height:100vh;font-family:monospace;padding:16px;}
.wrap{display:flex;flex-direction:column;align-items:center;gap:18px;width:100%;max-width:320px;}
h1{font-size:56px;font-weight:900;letter-spacing:10px;}
.sub{font-size:11px;color:#555;letter-spacing:3px;margin-top:-14px;}
.divider{width:100%;display:flex;align-items:center;gap:10px;color:#444;font-size:10px;letter-spacing:2px;}
.divider::before,.divider::after{content:'';flex:1;border-top:1px solid #222;}
.btn{width:100%;padding:13px;font-family:monospace;font-size:12px;font-weight:700;letter-spacing:2px;cursor:pointer;border:none;display:flex;align-items:center;justify-content:center;gap:10px;touch-action:manipulation;}
.btn:disabled{opacity:.4;cursor:default;}
.btn-google{background:#fff;color:#000;}
.btn-google:hover:not(:disabled){background:#ddd;}
.btn-discord{background:#5865F2;color:#fff;}
.btn-discord:hover:not(:disabled){background:#4752c4;}
.btn-anon{background:#000;color:#888;border:2px solid #333;}
.btn-anon:hover:not(:disabled){border-color:#fff;color:#fff;}
.nick-row{display:flex;gap:8px;width:100%;}
input{flex:1;padding:11px;background:#111;border:2px solid #555;color:#fff;font-family:monospace;font-size:14px;letter-spacing:2px;}
input:focus{outline:none;border-color:#fff;}
input::placeholder{color:#333;font-size:11px;}
#status{font-size:11px;letter-spacing:2px;text-align:center;min-height:16px;color:#888;}
#status.err{color:#f55;}
#status.ok{color:#5f5;}
.note{font-size:10px;color:#333;text-align:center;line-height:1.8;letter-spacing:1px;}
.back-link{font-size:11px;color:#444;text-decoration:none;letter-spacing:2px;}
.back-link:hover{color:#fff;}
.icon{width:18px;height:18px;flex-shrink:0;}
</style>
</head>
<body>
<div class="wrap">
  <h1>PONG</h1>
  <p class="sub">SIGN IN</p>

  <button class="btn btn-google" id="btn-google">
    <svg class="icon" viewBox="0 0 24 24">
      <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
      <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
      <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/>
      <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
    </svg>
    CONTINUE WITH GOOGLE
  </button>

  <button class="btn btn-discord" id="btn-discord">
    <svg class="icon" viewBox="0 0 24 24" fill="#fff">
      <path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057a.082.082 0 0 0 .031.057 19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028 14.09 14.09 0 0 0 1.226-1.994.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.2 10.2 0 0 0 .372-.292.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03zM8.02 15.33c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.956-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.956 2.418-2.157 2.418zm7.975 0c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.955-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.946 2.418-2.157 2.418z"/>
    </svg>
    CONTINUE WITH DISCORD
  </button>

  <div class="divider">OR PLAY ANONYMOUSLY</div>

  <div class="nick-row">
    <input type="text" id="nick-input" placeholder="YOUR NICKNAME" maxlength="16" autocomplete="off" spellcheck="false">
    <button class="btn btn-anon" style="width:auto;padding:11px 14px;white-space:nowrap;" id="btn-anon">GO</button>
  </div>
  <p class="note">Anonymous players cannot play online.</p>

  <div id="status"></div>
  <a href="index.html" class="back-link">← BACK</a>
</div>

<script type="module">
import { initializeApp }   from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, set, get, update }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";
import {
  getAuth, GoogleAuthProvider,
  signInWithRedirect, getRedirectResult,
  signInAnonymously, updateProfile
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const FC={
  apiKey:"AIzaSyDyZcVPRTMk8_k0Kr_prqNZ6bZlbGq1oV4",
  authDomain:"pong-online-18210.firebaseapp.com",
  databaseURL:"https://pong-online-18210-default-rtdb.firebaseio.com",
  projectId:"pong-online-18210",
  storageBucket:"pong-online-18210.firebasestorage.app",
  messagingSenderId:"897676900222",
  appId:"1:897676900222:web:7933fd119d9b573b9d252f"
};
const app  = initializeApp(FC);
const auth = getAuth(app);
const db   = getDatabase(app);

const DISCORD_CLIENT_ID = '1477737890485370940';
const DISCORD_REDIRECT  = encodeURIComponent('https://askyyplaitano-hash.github.io/SuperPong/auth.html');

// ── Helpers ───────────────────────────────────────────────────
function st(msg, cls='') {
  const e = document.getElementById('status');
  e.textContent = msg; e.className = cls;
}
function disableAll() {
  ['btn-google','btn-discord','btn-anon'].forEach(id => {
    const b = document.getElementById(id); if(b) b.disabled = true;
  });
}
function enableAll() {
  ['btn-google','btn-discord','btn-anon'].forEach(id => {
    const b = document.getElementById(id); if(b) b.disabled = false;
  });
}
function getDest()  { return sessionStorage.getItem('auth_redirect') || 'index.html'; }
function doRedirect() {
  const dest = getDest();
  sessionStorage.removeItem('auth_redirect');
  window.location.replace(dest);
}

async function saveProfile(user, nick, verified) {
  const r    = ref(db, `users/${user.uid}`);
  const snap = await get(r);
  if (!snap.exists()) {
    await set(r, {
      nickname : nick || user.displayName || 'Player',
      wins: 0, losses: 0,
      verified,
      created: Date.now()
    });
  } else {
    const upd = {};
    if (verified && !snap.val().verified)                     upd.verified = true;
    if (!snap.val().nickname && (nick || user.displayName))   upd.nickname = nick || user.displayName;
    if (Object.keys(upd).length) await update(r, upd);
  }
}

// ═══════════════════════════════════════════════════════════════
// DISCORD callback  (access_token in URL hash)
// ═══════════════════════════════════════════════════════════════
const hashParams    = new URLSearchParams(window.location.hash.substring(1));
const discordToken  = hashParams.get('access_token');

if (discordToken) {
  history.replaceState(null, '', window.location.pathname + window.location.search);
  disableAll();
  st('Signing in with Discord...');

  (async () => {
    try {
      const res = await fetch('https://discord.com/api/users/@me', {
        headers: { Authorization: `Bearer ${discordToken}` }
      });
      if (!res.ok) throw new Error('Discord API ' + res.status);
      const du   = await res.json();
      const nick = du.global_name || du.username || 'Player';
      const cred = await signInAnonymously(auth);
      await updateProfile(cred.user, { displayName: nick });
      await saveProfile(cred.user, nick, true);
      st('Welcome ' + nick + '!', 'ok');
      setTimeout(doRedirect, 700);
    } catch(err) {
      st('Discord error: ' + err.message, 'err');
      enableAll();
    }
  })();

} else {
  // ═══════════════════════════════════════════════════════════════
  // GOOGLE redirect return  — MUST be checked before anything else
  // Key insight: getRedirectResult resolves to null when there is
  // no pending redirect, and resolves to a UserCredential when
  // returning from Google.  We await it BEFORE touching auth state.
  // ═══════════════════════════════════════════════════════════════
  st('Checking sign-in status...');
  disableAll();

  try {
    const result = await getRedirectResult(auth);

    if (result && result.user) {
      // ── Returning from Google redirect ─────────────────────
      st('Saving profile...', 'ok');
      await saveProfile(result.user, result.user.displayName, true);
      st('Welcome ' + (result.user.displayName || 'Player') + '!', 'ok');
      doRedirect();

    } else {
      // ── No pending redirect — show the buttons normally ────
      st('');
      enableAll();

      // If already logged in from a previous session, go straight in
      const currentUser = auth.currentUser;
      if (currentUser) {
        st('Already signed in, redirecting...', 'ok');
        doRedirect();
      }
    }

  } catch(err) {
    // Ignore "no redirect pending" errors
    if (err.code !== 'auth/no-current-user' && err.code !== 'auth/null-user') {
      st('Error: ' + err.message, 'err');
    } else {
      st('');
    }
    enableAll();
  }
}

// ── Google button ─────────────────────────────────────────────
// Always use redirect — popup fails on GitHub Pages because
// authDomain (firebaseapp.com) is a different origin.
document.getElementById('btn-google').onclick = async () => {
  disableAll();
  st('Redirecting to Google...');
  // Save destination BEFORE navigating away
  // (sessionStorage survives redirect if same origin — GitHub Pages is same origin)
  try {
    await signInWithRedirect(auth, new GoogleAuthProvider());
    // Browser navigates away.  On return, the code above handles getRedirectResult.
  } catch(err) {
    st('Error: ' + err.message, 'err');
    enableAll();
  }
};

// ── Discord button ────────────────────────────────────────────
document.getElementById('btn-discord').onclick = () => {
  window.location.href =
    `https://discord.com/api/oauth2/authorize` +
    `?client_id=${DISCORD_CLIENT_ID}` +
    `&redirect_uri=${DISCORD_REDIRECT}` +
    `&response_type=token` +
    `&scope=identify`;
};

// ── Anonymous button ──────────────────────────────────────────
async function anonSignIn() {
  const nick = document.getElementById('nick-input').value.trim();
  if (!nick) { st('Enter a nickname', 'err'); return; }
  disableAll();
  st('Signing in...');
  try {
    const result = await signInAnonymously(auth);
    await updateProfile(result.user, { displayName: nick });
    await saveProfile(result.user, nick, false);
    st('Welcome ' + nick + '!', 'ok');
    setTimeout(doRedirect, 600);
  } catch(err) {
    st('Error: ' + err.message, 'err');
    enableAll();
  }
}
document.getElementById('btn-anon').onclick = anonSignIn;
document.getElementById('nick-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') anonSignIn();
});
</script>
</body>
</html>
