<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>PONG — SIGN IN</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:#000;color:#fff;display:flex;justify-content:center;align-items:center;min-height:100vh;font-family:monospace;padding:16px;}
  .wrap{display:flex;flex-direction:column;align-items:center;gap:20px;width:100%;max-width:340px;}
  h1{font-size:56px;font-weight:900;letter-spacing:10px;}
  .sub{font-size:11px;color:#555;letter-spacing:3px;margin-top:-14px;}

  .divider{width:100%;display:flex;align-items:center;gap:10px;color:#444;font-size:10px;letter-spacing:2px;}
  .divider::before,.divider::after{content:'';flex:1;border-top:1px solid #222;}

  .btn{width:100%;padding:13px;font-family:monospace;font-size:12px;font-weight:700;letter-spacing:3px;cursor:pointer;border:none;}
  .btn:disabled{opacity:0.4;cursor:default;}
  .btn-google{background:#fff;color:#000;}
  .btn-google:hover:not(:disabled){background:#ddd;}
  .btn-phone{background:#000;color:#fff;border:2px solid #fff;}
  .btn-phone:hover:not(:disabled){background:#fff;color:#000;}
  .btn-anon{background:#000;color:#888;border:2px solid #333;}
  .btn-anon:hover:not(:disabled){border-color:#fff;color:#fff;}

  .phone-wrap{width:100%;display:flex;flex-direction:column;gap:10px;}
  .nick-row{display:flex;gap:8px;width:100%;}

  input{flex:1;width:100%;padding:11px;background:#111;border:2px solid #555;color:#fff;font-family:monospace;font-size:14px;letter-spacing:2px;}
  input:focus{outline:none;border-color:#fff;}
  input::placeholder{color:#333;font-size:11px;}
  input:disabled{opacity:0.4;}

  #status{font-size:11px;letter-spacing:2px;text-align:center;min-height:16px;color:#888;}
  #status.err{color:#f55;}
  #status.ok{color:#5f5;}
  .note{font-size:10px;color:#333;text-align:center;line-height:1.8;letter-spacing:1px;}

  /* invisible recaptcha anchor */
  #recaptcha-container{position:absolute;bottom:0;left:0;}
</style>
</head>
<body>
<div class="wrap">
  <h1>PONG</h1>
  <p class="sub">SIGN IN TO PLAY</p>

  <!-- Google -->
  <button class="btn btn-google" id="btn-google">▶ CONTINUE WITH GOOGLE</button>

  <div class="divider">OR PHONE</div>

  <!-- Phone -->
  <div class="phone-wrap">
    <input type="tel" id="phone-input" placeholder="+39 333 1234567" autocomplete="tel">
    <button class="btn btn-phone" id="btn-send-sms">SEND SMS CODE</button>
    <div id="otp-section" style="display:none;flex-direction:column;gap:10px;">
      <input type="text" id="otp-input" placeholder="6-DIGIT CODE" maxlength="6" autocomplete="one-time-code" inputmode="numeric">
      <button class="btn btn-phone" id="btn-verify">VERIFY CODE</button>
      <button class="btn btn-anon" id="btn-resend" style="font-size:10px;padding:8px;">RESEND SMS</button>
    </div>
  </div>

  <div class="divider">OR ANONYMOUS</div>

  <!-- Nickname -->
  <div class="nick-row">
    <input type="text" id="nick-input" placeholder="YOUR NICKNAME" maxlength="16" autocomplete="off">
    <button class="btn btn-anon" style="width:auto;padding:11px 16px;white-space:nowrap;" id="btn-anon">GO →</button>
  </div>
  <p class="note">Anonymous players cannot appear<br>in the global leaderboard.</p>

  <div id="status"></div>
</div>

<!-- invisible recaptcha lives here, outside the flow -->
<div id="recaptcha-container"></div>

<script type="module">
import { initializeApp }  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, set, get, update } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";
import {
  getAuth, GoogleAuthProvider, signInWithPopup,
  RecaptchaVerifier, signInWithPhoneNumber,
  signInAnonymously, updateProfile, onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const firebaseConfig={
  apiKey:"AIzaSyDyZcVPRTMk8_k0Kr_prqNZ6bZlbGq1oV4",
  authDomain:"pong-online-18210.firebaseapp.com",
  databaseURL:"https://pong-online-18210-default-rtdb.firebaseio.com",
  projectId:"pong-online-18210",
  storageBucket:"pong-online-18210.firebasestorage.app",
  messagingSenderId:"897676900222",
  appId:"1:897676900222:web:7933fd119d9b573b9d252f"
};
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db   = getDatabase(app);

// ── Helpers ──────────────────────────────────────────────────
function setStatus(msg, cls=''){
  const e = document.getElementById('status');
  e.textContent = msg; e.className = cls || '';
}
function setBtn(id, disabled){ document.getElementById(id).disabled = disabled; }

// ── Wait for auth to settle before redirecting ────────────────
let authReady = false;
onAuthStateChanged(auth, user => {
  if(!authReady){ authReady = true; return; } // skip first fire on page load
  if(user){
    const dest = sessionStorage.getItem('auth_redirect') || 'index.html';
    sessionStorage.removeItem('auth_redirect');
    window.location.href = dest;
  }
});

// ── Save / update user profile in DB ─────────────────────────
async function saveUserProfile(user, nickname, verified){
  const userRef = ref(db, `users/${user.uid}`);
  const snap = await get(userRef);
  if(!snap.exists()){
    // First time: create full profile
    await set(userRef, {
      nickname: nickname || user.displayName || 'Player',
      wins: 0,
      losses: 0,
      verified: verified,
      created: Date.now()
    });
  } else {
    // Existing user: only upgrade verified, never downgrade
    const updates = {};
    if(verified && !snap.val().verified) updates.verified = true;
    if(nickname && !snap.val().nickname)  updates.nickname = nickname;
    if(Object.keys(updates).length) await update(userRef, updates);
  }
}

// ── Google sign-in ────────────────────────────────────────────
document.getElementById('btn-google').onclick = async () => {
  setBtn('btn-google', true);
  setStatus('Opening Google...', '');
  try{
    const provider = new GoogleAuthProvider();
    const result   = await signInWithPopup(auth, provider);
    await saveUserProfile(result.user, result.user.displayName, true);
    setStatus('Signed in! Redirecting...', 'ok');
    // onAuthStateChanged will redirect
  } catch(e){
    setStatus('Error: ' + e.message, 'err');
    setBtn('btn-google', false);
  }
};

// ── Phone sign-in ─────────────────────────────────────────────
// Invisible reCAPTCHA — must be created once, before any SMS call
let recaptchaVerifier = null;
let confirmationResult = null;

function initRecaptcha(){
  if(recaptchaVerifier) return;
  recaptchaVerifier = new RecaptchaVerifier(auth, 'recaptcha-container', {
    size: 'invisible',
    callback: () => {} // solved automatically
  });
  recaptchaVerifier.render(); // pre-render
}

async function sendSMS(){
  const phone = document.getElementById('phone-input').value.trim();
  if(!phone){ setStatus('Enter a phone number (e.g. +39 333 1234567)', 'err'); return; }
  if(!phone.startsWith('+')){ setStatus('Include country code, e.g. +39...', 'err'); return; }

  setBtn('btn-send-sms', true);
  setStatus('Sending SMS...', '');
  try{
    initRecaptcha();
    confirmationResult = await signInWithPhoneNumber(auth, phone, recaptchaVerifier);
    document.getElementById('otp-section').style.display = 'flex';
    document.getElementById('phone-input').disabled = true;
    setStatus('SMS sent! Enter the 6-digit code.', 'ok');
  } catch(e){
    setStatus('SMS error: ' + e.message, 'err');
    setBtn('btn-send-sms', false);
    // Reset recaptcha on error so user can retry
    if(recaptchaVerifier){ recaptchaVerifier.clear(); recaptchaVerifier = null; }
  }
}

document.getElementById('btn-send-sms').onclick = sendSMS;

document.getElementById('btn-resend').onclick = async () => {
  // Re-enable phone input for new number
  document.getElementById('phone-input').disabled = false;
  document.getElementById('otp-section').style.display = 'none';
  setBtn('btn-send-sms', false);
  if(recaptchaVerifier){ recaptchaVerifier.clear(); recaptchaVerifier = null; }
  setStatus('Enter your number again and press SEND SMS.', '');
};

document.getElementById('btn-verify').onclick = async () => {
  const code = document.getElementById('otp-input').value.trim();
  if(!code || code.length < 6){ setStatus('Enter the 6-digit code', 'err'); return; }
  setBtn('btn-verify', true);
  setStatus('Verifying...', '');
  try{
    const result = await confirmationResult.confirm(code);
    await saveUserProfile(result.user, null, true);
    setStatus('Verified! Redirecting...', 'ok');
    // onAuthStateChanged will redirect
  } catch(e){
    setStatus('Wrong code: ' + e.message, 'err');
    setBtn('btn-verify', false);
  }
};

// ── Anonymous sign-in ─────────────────────────────────────────
async function anonSignIn(){
  const nick = document.getElementById('nick-input').value.trim();
  if(!nick){ setStatus('Enter a nickname', 'err'); return; }
  setBtn('btn-anon', true);
  setStatus('Signing in...', '');
  try{
    const result = await signInAnonymously(auth);
    await updateProfile(result.user, { displayName: nick });
    await saveUserProfile(result.user, nick, false);
    setStatus('Welcome, ' + nick + '! Redirecting...', 'ok');
    // onAuthStateChanged will redirect
  } catch(e){
    setStatus('Error: ' + e.message, 'err');
    setBtn('btn-anon', false);
  }
}

document.getElementById('btn-anon').onclick = anonSignIn;
document.getElementById('nick-input').addEventListener('keydown', e => {
  if(e.key === 'Enter') anonSignIn();
});
</script>
</body>
</html>
