<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>PONG — SHOP</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#000;color:#fff;font-family:monospace;padding:16px;display:flex;justify-content:center;}
.wrap{display:flex;flex-direction:column;align-items:center;gap:20px;width:100%;max-width:680px;}
h1{font-size:clamp(36px,10vw,60px);font-weight:900;letter-spacing:10px;}
.sub{font-size:11px;color:#555;letter-spacing:3px;margin-top:-14px;}

/* header bar */
.topbar{display:flex;justify-content:space-between;align-items:center;width:100%;padding:10px 14px;border:1px solid #222;font-size:12px;}
.coins{font-size:18px;font-weight:900;letter-spacing:2px;}
.coins-lbl{font-size:10px;color:#888;letter-spacing:2px;}

/* section */
.section-title{width:100%;font-size:10px;letter-spacing:4px;color:#555;padding-bottom:8px;border-bottom:1px solid #111;}

/* grid */
.skin-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:12px;width:100%;}
.skin-card{border:2px solid #222;padding:14px 10px;display:flex;flex-direction:column;align-items:center;gap:10px;cursor:pointer;transition:border-color .1s;}
.skin-card:hover{border-color:#555;}
.skin-card.owned{border-color:#444;}
.skin-card.equipped{border-color:#fff;}
.skin-card.equipped .equip-btn{background:#fff;color:#000;}

/* preview canvas */
.skin-preview{width:60px;height:80px;border:1px solid #222;background:#000;}
.skin-name{font-size:11px;letter-spacing:2px;text-align:center;}
.skin-price{font-size:12px;font-weight:700;letter-spacing:2px;}
.skin-price.free{color:#555;}
.skin-price.owned{color:#3a3;}

.equip-btn{width:100%;padding:7px;font-family:monospace;font-size:10px;font-weight:700;letter-spacing:2px;cursor:pointer;border:2px solid #fff;background:#000;color:#fff;touch-action:manipulation;}
.equip-btn:hover{background:#fff;color:#000;}
.equip-btn:disabled{opacity:0.3;cursor:default;}
.buy-btn{width:100%;padding:7px;font-family:monospace;font-size:10px;font-weight:700;letter-spacing:2px;cursor:pointer;border:2px solid #fff;background:#fff;color:#000;touch-action:manipulation;}
.buy-btn:hover{background:#ccc;}
.buy-btn:disabled{opacity:0.3;cursor:default;}

/* pack */
.pack-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:12px;width:100%;}
.pack-card{border:2px solid #333;padding:14px;display:flex;flex-direction:column;gap:10px;}
.pack-title{font-size:13px;font-weight:700;letter-spacing:2px;}
.pack-contents{font-size:10px;color:#888;line-height:1.8;letter-spacing:1px;}
.pack-price{font-size:14px;font-weight:900;letter-spacing:2px;}

#status{font-size:11px;letter-spacing:2px;text-align:center;min-height:16px;color:#888;}
#status.ok{color:#5f5;}
#status.err{color:#f55;}

.nav{display:flex;gap:10px;width:100%;}
.nav-btn{flex:1;padding:11px;font-family:monospace;font-size:11px;letter-spacing:2px;cursor:pointer;border:2px solid #fff;background:#000;color:#fff;text-align:center;text-decoration:none;display:block;}
.nav-btn:hover{background:#fff;color:#000;}
</style>
</head>
<body>
<div class="wrap">
  <h1>SHOP</h1>
  <p class="sub">SPEND YOUR COINS</p>

  <div class="topbar">
    <div>
      <div class="coins" id="coins-display">—</div>
      <div class="coins-lbl">COINS</div>
    </div>
    <div style="font-size:11px;color:#555;text-align:right">Earn coins by playing online<br>Win = 10 coins &nbsp;|&nbsp; Lose = 3 coins</div>
  </div>

  <div id="status"></div>

  <div class="section-title">SINGLE SKINS</div>
  <div class="skin-grid" id="skin-grid"></div>

  <div class="section-title">PACKS</div>
  <div class="pack-grid" id="pack-grid"></div>

  <div class="nav">
    <a class="nav-btn" href="index.html">← BACK</a>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, get, update } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const FC={apiKey:"AIzaSyDyZcVPRTMk8_k0Kr_prqNZ6bZlbGq1oV4",authDomain:"pong-online-18210.firebaseapp.com",databaseURL:"https://pong-online-18210-default-rtdb.firebaseio.com",projectId:"pong-online-18210",storageBucket:"pong-online-18210.firebasestorage.app",messagingSenderId:"897676900222",appId:"1:897676900222:web:7933fd119d9b573b9d252f"};
const app=initializeApp(FC), db=getDatabase(app), auth=getAuth(app);

// ── Skin definitions ──────────────────────────────────────────
const SKINS=[
  {id:'default', name:'DEFAULT',    price:0},
  {id:'red',     name:'RED',        price:20},
  {id:'yellow',  name:'YELLOW',     price:20},
  {id:'blue',    name:'BLUE',       price:20},
  {id:'green',   name:'GREEN',      price:20},
  {id:'purple',  name:'PURPLE',     price:25},
  {id:'cyan',    name:'CYAN',       price:25},
  {id:'orange',  name:'ORANGE',     price:25},
  {id:'brick',   name:'BRICK',      price:40},
  {id:'cloud',   name:'CLOUD',      price:50},
  {id:'fish',    name:'FISH',       price:50},
  {id:'pencil',  name:'PENCIL',     price:60},
  {id:'baguette',name:'BAGUETTE',   price:80},
];

// ── Pack definitions ──────────────────────────────────────────
const PACKS=[
  {id:'colors', name:'COLOR PACK',   skins:['red','yellow','blue','green'], price:60,
   desc:'Red + Yellow + Blue + Green'},
  {id:'premium',name:'PREMIUM PACK', skins:['purple','cyan','orange','brick'], price:80,
   desc:'Purple + Cyan + Orange + Brick'},
  {id:'weird',  name:'WEIRD PACK',   skins:['cloud','fish','pencil','baguette'], price:150,
   desc:'Cloud + Fish + Pencil + Baguette'},
  {id:'all',    name:'MEGA PACK',    skins:SKINS.filter(s=>s.price>0).map(s=>s.id), price:280,
   desc:'All skins at a discount!'},
];

let currentUser=null, userData={coins:0, ownedSkins:['default'], equippedSkin:'default'};

onAuthStateChanged(auth,async user=>{
  currentUser=user;
  if(!user){setStatus('Sign in to use the shop','err');return;}
  await loadUser();
  renderAll();
});

async function loadUser(){
  const snap=await get(ref(db,`users/${currentUser.uid}`));
  if(snap.exists()){
    const d=snap.val();
    userData.coins=d.coins||0;
    userData.ownedSkins=d.ownedSkins||['default'];
    userData.equippedSkin=d.equippedSkin||'default';
    if(!userData.ownedSkins.includes('default'))userData.ownedSkins.push('default');
  }
  document.getElementById('coins-display').textContent=userData.coins;
}

function setStatus(m,c=''){const e=document.getElementById('status');e.textContent=m;e.className=c;}

// ── Canvas preview renderer ───────────────────────────────────
function renderPreview(canvas,skinId){
  const ctx=canvas.getContext('2d');
  const W=canvas.width,H=canvas.height;
  ctx.fillStyle='#000';ctx.fillRect(0,0,W,H);
  const x=W/2-4,y=0,pw=8,ph=H;
  ctx.save();ctx.beginPath();ctx.rect(x,y,pw,ph);ctx.clip();
  switch(skinId){
    case 'brick':
      ctx.fillStyle='#c84';ctx.fillRect(x,y,pw,ph);
      ctx.fillStyle='#000';
      for(let r=0;r<6;r++){ctx.fillRect(x,y+r*14,pw,1);if(r<6)ctx.fillRect(x+(r%2===0?pw/2:0),y+r*14,1,14);}break;
    case 'red':    ctx.fillStyle='#e33';ctx.fillRect(x,y,pw,ph);break;
    case 'yellow': ctx.fillStyle='#ee2';ctx.fillRect(x,y,pw,ph);break;
    case 'blue':   ctx.fillStyle='#33e';ctx.fillRect(x,y,pw,ph);break;
    case 'green':  ctx.fillStyle='#3a3';ctx.fillRect(x,y,pw,ph);break;
    case 'purple': ctx.fillStyle='#a3a';ctx.fillRect(x,y,pw,ph);break;
    case 'cyan':   ctx.fillStyle='#0cc';ctx.fillRect(x,y,pw,ph);break;
    case 'orange': ctx.fillStyle='#f70';ctx.fillRect(x,y,pw,ph);break;
    case 'cloud':
      ctx.fillStyle='#aad';ctx.fillRect(x,y,pw,ph);
      ctx.fillStyle='#fff';for(let r=0;r<4;r++){ctx.fillRect(x+1,y+r*20+3,pw-2,4);ctx.fillRect(x+1,y+r*20+10,pw-2,4);}break;
    case 'fish':
      ctx.fillStyle='#48f';ctx.fillRect(x,y,pw,ph);
      ctx.fillStyle='#6af';for(let r=0;r<5;r++)ctx.fillRect(x+1,y+r*16+2,pw-2,8);
      ctx.fillStyle='#fff';ctx.fillRect(x+pw/2-1,y+2,2,ph-4);break;
    case 'pencil':
      ctx.fillStyle='#fe8';ctx.fillRect(x,y,pw,ph-6);
      ctx.fillStyle='#f84';ctx.fillRect(x,y+ph-6,pw,4);
      ctx.fillStyle='#888';ctx.fillRect(x+pw/2-1,y,2,ph);break;
    case 'baguette':
      ctx.fillStyle='#e9a';ctx.fillRect(x,y,pw,ph);
      ctx.fillStyle='#c74';ctx.fillRect(x+2,y+4,pw-4,ph-8);
      ctx.fillStyle='#000';for(let r=0;r<5;r++)ctx.fillRect(x+1,y+8+r*14,pw-2,1);break;
    default:
      ctx.fillStyle='#fff';ctx.fillRect(x,y,pw,ph);
  }
  ctx.restore();
}

// ── Render UI ─────────────────────────────────────────────────
function renderAll(){
  renderSkins();renderPacks();
  document.getElementById('coins-display').textContent=userData.coins;
}

function renderSkins(){
  const grid=document.getElementById('skin-grid');grid.innerHTML='';
  SKINS.forEach(sk=>{
    const owned=userData.ownedSkins.includes(sk.id);
    const equipped=userData.equippedSkin===sk.id;
    const card=document.createElement('div');
    card.className='skin-card'+(equipped?' equipped':owned?' owned':'');

    const canvas=document.createElement('canvas');
    canvas.className='skin-preview';canvas.width=60;canvas.height=80;
    renderPreview(canvas,sk.id);

    const priceEl=document.createElement('div');
    priceEl.className='skin-price'+(sk.price===0?' free':owned?' owned':'');
    priceEl.textContent=sk.price===0?'FREE':owned?'OWNED':sk.price+' COINS';

    let actionBtn;
    if(equipped){
      actionBtn=document.createElement('button');actionBtn.className='equip-btn';
      actionBtn.textContent='EQUIPPED';actionBtn.disabled=true;
    } else if(owned){
      actionBtn=document.createElement('button');actionBtn.className='equip-btn';
      actionBtn.textContent='EQUIP';
      actionBtn.onclick=()=>equipSkin(sk.id);
    } else {
      actionBtn=document.createElement('button');actionBtn.className='buy-btn';
      actionBtn.textContent='BUY '+sk.price;
      actionBtn.disabled=!currentUser||userData.coins<sk.price;
      actionBtn.onclick=()=>buySkin(sk.id,sk.price);
    }

    const name=document.createElement('div');name.className='skin-name';name.textContent=sk.name;

    card.appendChild(canvas);
    card.appendChild(name);
    card.appendChild(priceEl);
    card.appendChild(actionBtn);
    grid.appendChild(card);
  });
}

function renderPacks(){
  const grid=document.getElementById('pack-grid');grid.innerHTML='';
  PACKS.forEach(pk=>{
    const allOwned=pk.skins.every(s=>userData.ownedSkins.includes(s));
    const card=document.createElement('div');card.className='pack-card';
    const title=document.createElement('div');title.className='pack-title';title.textContent=pk.name;
    const desc=document.createElement('div');desc.className='pack-contents';desc.textContent=pk.desc;
    const price=document.createElement('div');price.className='pack-price';
    price.textContent=allOwned?'OWNED':pk.price+' COINS';
    const btn=document.createElement('button');
    btn.className='buy-btn';
    btn.textContent=allOwned?'OWNED':'BUY PACK';
    btn.disabled=allOwned||!currentUser||userData.coins<pk.price;
    btn.onclick=()=>buyPack(pk);
    card.appendChild(title);card.appendChild(desc);card.appendChild(price);card.appendChild(btn);
    grid.appendChild(card);
  });
}

// ── Actions ───────────────────────────────────────────────────
async function equipSkin(id){
  if(!currentUser)return;
  userData.equippedSkin=id;
  await update(ref(db,`users/${currentUser.uid}`),{equippedSkin:id});
  setStatus('Equipped '+id+'!','ok');
  renderAll();
}

async function buySkin(id,price){
  if(!currentUser){setStatus('Sign in first','err');return;}
  if(userData.coins<price){setStatus('Not enough coins','err');return;}
  userData.coins-=price;
  if(!userData.ownedSkins.includes(id))userData.ownedSkins.push(id);
  await update(ref(db,`users/${currentUser.uid}`),{
    coins:userData.coins,
    ownedSkins:userData.ownedSkins
  });
  setStatus('Purchased '+id+'!','ok');
  renderAll();
}

async function buyPack(pk){
  if(!currentUser){setStatus('Sign in first','err');return;}
  if(userData.coins<pk.price){setStatus('Not enough coins','err');return;}
  userData.coins-=pk.price;
  pk.skins.forEach(s=>{if(!userData.ownedSkins.includes(s))userData.ownedSkins.push(s);});
  await update(ref(db,`users/${currentUser.uid}`),{
    coins:userData.coins,
    ownedSkins:userData.ownedSkins
  });
  setStatus('Purchased '+pk.name+'!','ok');
  renderAll();
}
</script>
</body>
</html>
