<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>PONG</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#000;color:#fff;display:flex;justify-content:center;align-items:center;min-height:100vh;font-family:monospace;padding:16px;}
.wrap{display:flex;flex-direction:column;align-items:center;gap:16px;width:100%;max-width:340px;}
h1{font-size:clamp(56px,18vw,100px);font-weight:900;letter-spacing:clamp(8px,3vw,16px);}
.sub{font-size:11px;color:#555;letter-spacing:4px;margin-top:-14px;}
.user-bar{display:flex;justify-content:space-between;align-items:center;width:100%;padding:8px 12px;border:1px solid #222;font-size:11px;}
.user-left{display:flex;flex-direction:column;gap:2px;}
.user-nick{letter-spacing:1px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:180px;}
.user-coins{font-size:10px;color:#888;letter-spacing:1px;}
.user-link{color:#888;font-size:10px;cursor:pointer;border:none;background:none;font-family:monospace;letter-spacing:1px;}
.user-link:hover{color:#fff;}
.mode-btn{width:100%;padding:14px;font-family:monospace;font-size:13px;font-weight:700;letter-spacing:3px;cursor:pointer;text-decoration:none;display:block;text-align:center;touch-action:manipulation;}
.mode-btn.solid  {background:#fff;color:#000;border:none;}
.mode-btn.solid:hover{background:#ccc;}
.mode-btn.outline{background:#000;color:#fff;border:2px solid #fff;}
.mode-btn.outline:hover{background:#fff;color:#000;}
.mode-btn.shop   {background:#000;color:#fff;border:2px solid #555;font-size:12px;}
.mode-btn.shop:hover{border-color:#fff;}
.divider{width:100%;border-top:1px solid #1a1a1a;}
.hint{font-size:10px;color:#444;letter-spacing:2px;text-align:center;}
</style>
</head>
<body>
<div class="wrap">
  <h1>PONG</h1>
  <p class="sub">SELECT MODE</p>

  <div class="user-bar" id="user-bar" style="display:none">
    <div class="user-left">
      <span class="user-nick" id="bar-nick">—</span>
      <span class="user-coins" id="bar-coins"></span>
    </div>
    <button class="user-link" id="btn-signout">SIGN OUT</button>
  </div>

  <a class="mode-btn solid"   href="bot.html">VS BOT</a>
  <a class="mode-btn outline" href="local.html">LOCAL 2P</a>
  <div class="divider"></div>
  <a class="mode-btn outline" href="online.html"    id="btn-online">ONLINE 1v1</a>
  <a class="mode-btn outline" href="online2v2.html" id="btn-2v2">ONLINE 2v2</a>
  <div class="divider"></div>
  <a class="mode-btn shop"    href="shop.html"      id="btn-shop">SHOP</a>

  <p class="hint" id="auth-hint"></p>
</div>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, get } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
const FC={apiKey:"AIzaSyDyZcVPRTMk8_k0Kr_prqNZ6bZlbGq1oV4",authDomain:"pong-online-18210.firebaseapp.com",databaseURL:"https://pong-online-18210-default-rtdb.firebaseio.com",projectId:"pong-online-18210",storageBucket:"pong-online-18210.firebasestorage.app",messagingSenderId:"897676900222",appId:"1:897676900222:web:7933fd119d9b573b9d252f"};
const app=initializeApp(FC),auth=getAuth(app),db=getDatabase(app);
onAuthStateChanged(auth,async user=>{
  if(user){
    const snap=await get(ref(db,`users/${user.uid}`));
    const d=snap.val()||{};
    const nick=d.nickname||user.displayName||'Player';
    const coins=d.coins||0;
    document.getElementById('user-bar').style.display='flex';
    document.getElementById('bar-nick').textContent=nick;
    document.getElementById('bar-coins').textContent=coins+' COINS';
    document.getElementById('auth-hint').textContent='';
  } else {
    document.getElementById('user-bar').style.display='none';
    document.getElementById('auth-hint').textContent='Sign in to play online';
  }
});
document.getElementById('btn-signout').onclick=async()=>{await signOut(auth);};
['btn-online','btn-2v2'].forEach(id=>{
  document.getElementById(id).onclick=e=>{
    if(!auth.currentUser){
      e.preventDefault();
      sessionStorage.setItem('auth_redirect',id==='btn-online'?'online.html':'online2v2.html');
      window.location.href='auth.html';
    }
  };
});
</script>
</body>
</html>
