<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>PONG — ONLINE 2v2</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  body{background:#000;color:#fff;display:flex;justify-content:center;align-items:center;min-height:100vh;font-family:monospace;padding:8px;overflow:hidden;}

  .screen{display:none;flex-direction:column;align-items:center;gap:16px;width:100%;max-width:800px;}
  .screen.active{display:flex;}
  h1{font-size:clamp(36px,9vw,60px);font-weight:900;letter-spacing:clamp(5px,2vw,10px);}
  .sub{font-size:11px;color:#555;letter-spacing:3px;margin-top:-12px;}

  .user-bar{display:flex;justify-content:space-between;align-items:center;width:100%;max-width:380px;padding:8px 12px;border:1px solid #222;font-size:11px;}
  .user-nick{letter-spacing:1px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:200px;}
  .user-link{color:#888;font-size:10px;letter-spacing:1px;cursor:pointer;background:none;border:none;font-family:monospace;}
  .user-link:hover{color:#fff;}

  .tabs{display:flex;width:100%;max-width:380px;}
  .tab{flex:1;padding:11px;text-align:center;font-family:monospace;font-size:12px;letter-spacing:2px;cursor:pointer;border:2px solid #fff;background:#000;color:#fff;}
  .tab+.tab{border-left:none;}
  .tab.active{background:#fff;color:#000;}
  .panel{width:100%;max-width:380px;border:2px solid #fff;border-top:none;padding:18px;display:flex;flex-direction:column;gap:12px;}
  .panel-label{font-size:10px;color:#888;letter-spacing:3px;}
  .code-box{font-size:28px;font-weight:900;letter-spacing:8px;text-align:center;padding:10px;border:2px solid #555;background:#111;min-height:52px;display:flex;align-items:center;justify-content:center;}
  .code-box.dim{font-size:12px;color:#555;letter-spacing:2px;font-weight:normal;}
  input[type=text]{width:100%;padding:10px;background:#111;border:2px solid #555;color:#fff;font-family:monospace;font-size:15px;letter-spacing:4px;text-transform:uppercase;text-align:center;}
  input[type=text]:focus{outline:none;border-color:#fff;}
  input[type=text]::placeholder{color:#333;font-size:11px;letter-spacing:2px;}
  .btn{width:100%;padding:11px;background:#fff;color:#000;border:none;font-family:monospace;font-size:12px;font-weight:700;letter-spacing:3px;cursor:pointer;touch-action:manipulation;}
  .btn:hover,.btn:active{background:#ccc;}
  .btn.outline{background:#000;color:#fff;border:2px solid #fff;}
  .btn.outline:hover,.btn.outline:active{background:#fff;color:#000;}
  .btn.sm{font-size:11px;padding:8px;}

  /* waiting room */
  .waiting-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;width:100%;max-width:380px;}
  .team-box{border:2px solid #333;padding:12px;display:flex;flex-direction:column;gap:8px;}
  .team-title{font-size:10px;letter-spacing:3px;color:#888;}
  .player-slot{font-size:12px;letter-spacing:1px;padding:6px 0;border-bottom:1px solid #111;min-height:28px;}
  .player-slot.empty{color:#444;}
  .player-slot.me{color:#fff;}
  .player-slot.other{color:#ccc;}

  #lobby-status{font-size:11px;letter-spacing:2px;text-align:center;min-height:16px;color:#888;}
  #lobby-status.err{color:#f55;}
  #lobby-status.ok{color:#5f5;}
  #room-list{display:flex;flex-direction:column;gap:6px;max-height:140px;overflow-y:auto;}
  .room-empty{font-size:11px;color:#555;text-align:center;padding:8px;}
  .room-row{display:flex;justify-content:space-between;align-items:center;padding:8px 10px;border:1px solid #333;}
  .room-code{font-size:13px;letter-spacing:3px;}
  .join-r{padding:4px 12px;background:#fff;color:#000;border:none;font-family:monospace;font-size:10px;cursor:pointer;}
  .back-link{font-size:11px;color:#444;text-decoration:none;letter-spacing:2px;}
  .back-link:hover{color:#fff;}

  /* ── GAME LAYOUT ─────────────────────────── */
  #screen-game{flex-direction:row;flex-wrap:wrap;align-items:flex-start;justify-content:center;gap:8px;padding:4px;max-width:1040px;}
  .game-main{display:flex;flex-direction:column;gap:6px;flex:1;min-width:0;}

  /* Team labels above scoreboard */
  .team-labels{display:flex;justify-content:space-between;width:100%;}
  .team-label{font-size:10px;letter-spacing:2px;color:#555;width:50%;text-align:center;}

  .scoreboard{display:flex;justify-content:space-between;align-items:center;width:100%;}
  .score-box{text-align:center;min-width:80px;}
  .score-num{font-size:clamp(24px,6vw,48px);font-weight:900;}
  /* player name tags under score */
  .score-players{font-size:9px;color:#555;letter-spacing:1px;line-height:1.6;}
  #g-status{font-size:11px;color:#888;letter-spacing:2px;text-align:center;flex:1;padding:0 6px;}

  #canvas-wrap{width:100%;touch-action:none;position:relative;}
  #canvas{display:block;width:100%;height:auto;border:2px solid #fff;background:#000;touch-action:none;}

  /* Role indicator — shows which half of paddle you control */
  .role-hint{font-size:10px;color:#555;text-align:center;letter-spacing:2px;}

  /* touch controls */
  .touch-controls{display:none;width:100%;gap:8px;}
  @media(pointer:coarse){.touch-controls{display:flex;}}
  .touch-btn{flex:1;height:60px;background:#111;border:2px solid #fff;font-size:20px;cursor:pointer;touch-action:manipulation;user-select:none;display:flex;align-items:center;justify-content:center;}
  .touch-btn:active{background:#333;}

  .gfooter{display:flex;justify-content:space-between;align-items:center;width:100%;}
  .gfooter-btn{padding:6px 14px;border:2px solid #fff;background:#000;color:#fff;font-family:monospace;font-size:11px;letter-spacing:2px;cursor:pointer;}
  .gfooter-btn:hover,.gfooter-btn:active{background:#fff;color:#000;}
  .gfooter-hint{font-size:10px;color:#444;}

  /* chat */
  .chat-panel{display:flex;flex-direction:column;width:220px;border:2px solid #333;flex-shrink:0;}
  .chat-title{font-size:10px;letter-spacing:3px;padding:8px 10px;border-bottom:1px solid #333;color:#888;}
  .chat-messages{overflow-y:auto;padding:8px;display:flex;flex-direction:column;gap:6px;min-height:160px;max-height:360px;}
  .chat-messages::-webkit-scrollbar{width:4px;}
  .chat-messages::-webkit-scrollbar-thumb{background:#333;}
  .chat-msg{font-size:11px;line-height:1.5;word-break:break-word;}
  .chat-msg .sender{color:#888;font-size:10px;}
  .chat-msg .sender.me{color:#fff;}
  .chat-msg .text{color:#ccc;}
  .chat-msg.system .text{color:#555;font-style:italic;}
  .chat-input-row{display:flex;border-top:1px solid #333;}
  .chat-input{flex:1;padding:8px;background:#000;border:none;color:#fff;font-family:monospace;font-size:12px;outline:none;}
  .chat-input::placeholder{color:#333;}
  .chat-send{padding:8px 10px;background:#fff;color:#000;border:none;font-family:monospace;font-size:11px;font-weight:700;cursor:pointer;}
  .chat-send:hover{background:#ccc;}
  @media(max-width:700px){.chat-panel{width:100%;}.chat-messages{max-height:100px;}}

  /* win */
  #win-title{font-size:clamp(28px,8vw,48px);font-weight:900;letter-spacing:6px;}
  #win-score{font-size:18px;color:#888;}
  .win-btns{display:flex;gap:12px;flex-wrap:wrap;justify-content:center;}
  .win-btn{padding:12px 22px;font-family:monospace;font-size:12px;letter-spacing:2px;cursor:pointer;border:2px solid #fff;}
  #wbtn-rematch{background:#fff;color:#000;}
  #wbtn-rematch:hover{background:#ccc;}
  #wbtn-lobby{background:#000;color:#fff;}
  #wbtn-lobby:hover{background:#fff;color:#000;}
</style>
</head>
<body>

<!-- LOBBY -->
<div id="screen-lobby" class="screen active">
  <h1>2v2</h1>
  <p class="sub">ONLINE CO-OP PONG</p>
  <div class="user-bar" id="user-bar" style="display:none">
    <span class="user-nick" id="bar-nick">—</span>
    <button class="user-link" id="bar-signout">SIGN OUT</button>
  </div>
  <div class="tabs">
    <div class="tab active" id="tab-private" onclick="switchTab('private')">PRIVATE</div>
    <div class="tab"        id="tab-public"  onclick="switchTab('public')">PUBLIC</div>
  </div>
  <div class="panel" id="panel-private">
    <div class="panel-label">CREATE A PRIVATE ROOM</div>
    <div class="code-box dim" id="my-code">—</div>
    <button class="btn sm" onclick="createPrivate()">CREATE ROOM</button>
    <button class="btn sm outline" onclick="copyCode()">COPY CODE</button>
    <div class="panel-label" style="margin-top:4px">JOIN A PRIVATE ROOM</div>
    <input type="text" id="priv-input" maxlength="6" placeholder="ENTER CODE" autocomplete="off">
    <button class="btn" onclick="joinRoom()">JOIN</button>
  </div>
  <div class="panel" id="panel-public" style="display:none">
    <div class="panel-label">OPEN PUBLIC ROOMS</div>
    <div id="room-list"><div class="room-empty">Press refresh to search.</div></div>
    <button class="btn sm outline" onclick="refreshRooms()">↻ REFRESH</button>
    <div class="panel-label" style="margin-top:4px">OR CREATE ONE</div>
    <button class="btn" onclick="createPublic()">CREATE PUBLIC ROOM</button>
  </div>
  <div id="lobby-status"></div>
  <a href="index.html" class="back-link">← BACK</a>
</div>

<!-- WAITING ROOM (shows who has joined which slot) -->
<div id="screen-waiting" class="screen">
  <h1>2v2</h1>
  <p class="sub" id="waiting-code">ROOM: —</p>
  <div class="waiting-grid">
    <div class="team-box">
      <div class="team-title">TEAM LEFT</div>
      <div class="player-slot" id="slot-p1">—</div>
      <div class="player-slot" id="slot-p2">—</div>
    </div>
    <div class="team-box">
      <div class="team-title">TEAM RIGHT</div>
      <div class="player-slot" id="slot-p3">—</div>
      <div class="player-slot" id="slot-p4">—</div>
    </div>
  </div>
  <div id="waiting-status" style="font-size:11px;color:#888;letter-spacing:2px;text-align:center;">Waiting for players...</div>
  <button class="btn outline" style="max-width:200px" onclick="copyWaitCode()">COPY CODE</button>
  <button class="btn outline" style="max-width:200px" onclick="leaveWaiting()">← LEAVE</button>
</div>

<!-- GAME -->
<div id="screen-game" class="screen">
  <div class="game-main">
    <div class="team-labels">
      <div class="team-label" id="lbl-team-l">TEAM LEFT</div>
      <div class="team-label" id="lbl-team-r">TEAM RIGHT</div>
    </div>
    <div class="scoreboard">
      <div class="score-box">
        <div id="score-l" class="score-num">0</div>
        <div class="score-players" id="players-l">—</div>
      </div>
      <div id="g-status">—</div>
      <div class="score-box">
        <div id="score-r" class="score-num">0</div>
        <div class="score-players" id="players-r">—</div>
      </div>
    </div>
    <div id="canvas-wrap"><canvas id="canvas" width="760" height="480"></canvas></div>
    <div class="role-hint" id="role-hint">—</div>
    <div class="touch-controls">
      <button class="touch-btn" id="touch-up">▲</button>
      <button class="touch-btn" id="touch-down">▼</button>
    </div>
    <div class="gfooter">
      <button class="gfooter-btn" onclick="leaveGame()">← LOBBY</button>
      <span class="gfooter-hint" id="kb-hint">↑/↓ move &nbsp;|&nbsp; SPACE pause</span>
    </div>
  </div>
  <!-- CHAT -->
  <div class="chat-panel">
    <div class="chat-title">CHAT</div>
    <div class="chat-messages" id="chat-messages"></div>
    <div class="chat-input-row">
      <input class="chat-input" id="chat-input" placeholder="type..." maxlength="120" autocomplete="off">
      <button class="chat-send" onclick="sendChat()">SEND</button>
    </div>
  </div>
</div>

<!-- WIN -->
<div id="screen-win" class="screen">
  <div id="win-title"></div>
  <div id="win-score"></div>
  <div class="win-btns">
    <button class="win-btn" id="wbtn-rematch" onclick="requestRematch()">REMATCH</button>
    <button class="win-btn" id="wbtn-lobby"   onclick="leaveGame()">LOBBY</button>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, set, get, push, onValue, remove, update, off }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";
import { getAuth, onAuthStateChanged, signOut }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const FC={apiKey:"AIzaSyDyZcVPRTMk8_k0Kr_prqNZ6bZlbGq1oV4",authDomain:"pong-online-18210.firebaseapp.com",databaseURL:"https://pong-online-18210-default-rtdb.firebaseio.com",projectId:"pong-online-18210",storageBucket:"pong-online-18210.firebasestorage.app",messagingSenderId:"897676900222",appId:"1:897676900222:web:7933fd119d9b573b9d252f"};
const fbApp=initializeApp(FC), db=getDatabase(fbApp), auth=getAuth(fbApp);

// ── Constants ─────────────────────────────────────────────────
const W=760, H=480, PW=12, PH=160, BS=10, WIN=7, TICK=1000/60;
// Each player controls HALF the paddle height (80px)
const HALF=PH/2;

// ── Auth ──────────────────────────────────────────────────────
let currentUser=null, authResolve;
const authReady=new Promise(r=>{authResolve=r;});
onAuthStateChanged(auth,async user=>{
  currentUser=user; authResolve();
  if(user){
    const snap=await get(ref(db,`users/${user.uid}`));
    const nick=(snap.exists()&&snap.val().nickname)||user.displayName||'Player';
    document.getElementById('user-bar').style.display='flex';
    document.getElementById('bar-nick').textContent=nick;
  } else {
    document.getElementById('user-bar').style.display='none';
  }
});
document.getElementById('bar-signout').onclick=async()=>{await signOut(auth);window.location.href='auth.html';};

async function getNick(){
  await authReady;
  if(!currentUser) return 'Player';
  const snap=await get(ref(db,`users/${currentUser.uid}`));
  return (snap.exists()&&snap.val().nickname)||currentUser.displayName||'Player';
}

// ── Roles: p1=left-top, p2=left-bottom, p3=right-top, p4=right-bottom ──
// p1 is host (creates room)
// p2, p3, p4 join in order
let myRole=null; // 'p1'|'p2'|'p3'|'p4'
let myNick='Player';
let roomId=null;
let players={}; // { p1:{nick,uid}, p2:{...}, ... }

// Game state (host=p1 is authoritative)
let running=false, paused=true, rafId=null;
let accumulator=0, lastTick=0, rematchVotes=0, publicInterval=null;
// Paddle Y positions (top of full paddle)
let leftY=H/2-PH/2, rightY=H/2-PH/2;
// Per-player sub-paddle offsets within the full paddle
// p1 controls top half: offset 0..H/2-HALF
// p2 controls bottom half: offset HALF..PH-HALF (relative to leftY)
// p3/p4 same for right
let p1Y=0, p2Y=HALF, p3Y=0, p4Y=HALF; // offset within paddle
let ball=null, scoreL=0, scoreR=0;

// Subscriptions
let stateUnsub=null, inputUnsubP1=null, inputUnsubP2=null, inputUnsubP3=null, inputUnsubP4=null;
let signalUnsub=null, chatUnsub=null, playersUnsub=null, waitingUnsub=null;

// ── Input ─────────────────────────────────────────────────────
const keys={};
document.addEventListener('keydown',e=>{
  keys[e.key]=true;
  if(e.key===' '){e.preventDefault();togglePause();}
});
document.addEventListener('keyup',e=>{keys[e.key]=false;});
const touch={up:false,down:false};
['touchstart','mousedown'].forEach(ev=>{
  document.getElementById('touch-up').addEventListener(ev,e=>{e.preventDefault();touch.up=true;},{passive:false});
  document.getElementById('touch-down').addEventListener(ev,e=>{e.preventDefault();touch.down=true;},{passive:false});
});
['touchend','touchcancel','mouseup'].forEach(ev=>{
  document.getElementById('touch-up').addEventListener(ev,()=>{touch.up=false;});
  document.getElementById('touch-down').addEventListener(ev,()=>{touch.down=false;});
});
document.getElementById('canvas').addEventListener('click',()=>togglePause());
if(window.matchMedia('(pointer:coarse)').matches) document.getElementById('kb-hint').style.display='none';

// ── DB helpers ────────────────────────────────────────────────
const roomRef2 =id=>ref(db,`rooms2v2/${id}`);
const stateRef2=id=>ref(db,`rooms2v2/${id}/state`);
const inputRef2=(id,role)=>ref(db,`rooms2v2/${id}/input/${role}`);
const chatRef2 =id=>ref(db,`rooms2v2/${id}/chat`);
const pubRef2  =()=>ref(db,'public2v2');

function randCode(n=6){const c='ABCDEFGHJKLMNPQRSTUVWXYZ23456789';let s='';for(let i=0;i<n;i++)s+=c[Math.random()*c.length|0];return s;}

// ── UI helpers ────────────────────────────────────────────────
function show(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active');}
function setStatus(msg,cls=''){const e=document.getElementById('lobby-status');e.textContent=msg;e.className=cls||'';}
function setGStatus(msg){document.getElementById('g-status').textContent=msg;}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

window.switchTab=function(tab){
  document.getElementById('tab-private').classList.toggle('active',tab==='private');
  document.getElementById('tab-public').classList.toggle('active',tab==='public');
  document.getElementById('panel-private').style.display=tab==='private'?'flex':'none';
  document.getElementById('panel-public').style.display=tab==='public'?'flex':'none';
  if(tab==='public') refreshRooms();
};
window.copyCode=function(){if(!roomId)return;navigator.clipboard.writeText(roomId).then(()=>setStatus('Copied!','ok'));};
window.copyWaitCode=function(){if(!roomId)return;navigator.clipboard.writeText(roomId).then(()=>{document.getElementById('waiting-status').textContent='Code copied!';});};

// ── Create private ────────────────────────────────────────────
window.createPrivate=async function(){
  const id=randCode(6);
  roomId=id; myRole='p1';
  myNick=await getNick();
  const ownerUid=currentUser?currentUser.uid:'__anon_'+randCode(8);
  await set(roomRef2(id),{
    ownerUid, created:Date.now(), mode:'private',
    players:{ p1:{nick:myNick,uid:currentUser?.uid||'anon'} },
    state:null
  });
  document.getElementById('my-code').textContent=id;
  document.getElementById('my-code').classList.remove('dim');
  setStatus('Room '+id+' created!','ok');
  enterWaitingRoom();
};

// ── Join ──────────────────────────────────────────────────────
window.joinRoom=async function(){
  const id=document.getElementById('priv-input').value.trim().toUpperCase();
  if(id.length<4){setStatus('Enter a valid code','err');return;}
  await doJoin(id);
};

async function doJoin(id){
  const snap=await get(roomRef2(id));
  if(!snap.exists()){setStatus('Room not found','err');return;}
  const d=snap.val();
  const myUid=currentUser?currentUser.uid:null;
  if(myUid&&d.ownerUid===myUid){setStatus("Can't join your own room",'err');return;}
  const filled=Object.keys(d.players||{});
  if(filled.length>=4){setStatus('Room is full (4/4)','err');return;}
  // Assign next available slot
  const slots=['p1','p2','p3','p4'];
  const nextSlot=slots.find(s=>!filled.includes(s));
  if(!nextSlot){setStatus('Room is full','err');return;}
  roomId=id; myRole=nextSlot;
  myNick=await getNick();
  await update(ref(db,`rooms2v2/${id}/players`),{
    [nextSlot]:{nick:myNick,uid:currentUser?.uid||'anon'}
  });
  setStatus('Joined as '+nextSlot+'!','ok');
  enterWaitingRoom();
}

// ── Create public ─────────────────────────────────────────────
window.createPublic=async function(){
  const id=randCode(6);
  roomId=id; myRole='p1';
  myNick=await getNick();
  const ownerUid=currentUser?currentUser.uid:'__anon_'+randCode(8);
  const now=Date.now();
  await set(roomRef2(id),{
    ownerUid, created:now, mode:'public',
    players:{ p1:{nick:myNick,uid:currentUser?.uid||'anon'} },
    state:null
  });
  await set(ref(db,`public2v2/${id}`),{id,created:now,ownerUid});
  document.getElementById('my-code').textContent=id;
  document.getElementById('my-code').classList.remove('dim');
  setStatus('Public room '+id+' open!','ok');
  publicInterval=setInterval(()=>set(ref(db,`public2v2/${id}/ts`),Date.now()),20000);
  enterWaitingRoom();
};

window.refreshRooms=async function(){
  const el=document.getElementById('room-list');
  el.innerHTML='<div class="room-empty">Searching...</div>';
  const snap=await get(pubRef2());
  if(!snap.exists()||!snap.val()){el.innerHTML='<div class="room-empty">No open rooms.</div>';return;}
  const myUid=currentUser?currentUser.uid:null;
  const rooms=Object.values(snap.val()).filter(r=>Date.now()-r.created<120000&&r.id!==roomId&&!(myUid&&r.ownerUid===myUid));
  if(!rooms.length){el.innerHTML='<div class="room-empty">No open rooms.</div>';return;}
  el.innerHTML='';
  rooms.forEach(r=>{
    const row=document.createElement('div');row.className='room-row';
    row.innerHTML=`<span class="room-code">${r.id}</span><button class="join-r" onclick="joinPublicRoom('${r.id}')">JOIN</button>`;
    el.appendChild(row);
  });
};

window.joinPublicRoom=async function(id){ await doJoin(id); };

// ── Waiting room ──────────────────────────────────────────────
function enterWaitingRoom(){
  document.getElementById('waiting-code').textContent='ROOM: '+roomId;
  show('screen-waiting');
  updateWaitingDisplay({});

  // Listen for player changes
  if(waitingUnsub){waitingUnsub();waitingUnsub=null;}
  waitingUnsub=onValue(ref(db,`rooms2v2/${roomId}/players`),snap=>{
    players=snap.val()||{};
    updateWaitingDisplay(players);
    // All 4 slots filled → start game
    if(Object.keys(players).length===4){
      if(waitingUnsub){waitingUnsub();waitingUnsub=null;}
      if(publicInterval){clearInterval(publicInterval);remove(ref(db,`public2v2/${roomId}`));}
      beginGame();
    } else {
      const n=Object.keys(players).length;
      document.getElementById('waiting-status').textContent=`${n}/4 players joined. Waiting...`;
    }
  });
}

function updateWaitingDisplay(pl){
  const myUid=currentUser?.uid;
  ['p1','p2','p3','p4'].forEach((role,i)=>{
    const el=document.getElementById('slot-p'+[1,2,3,4][i]);
    const p=pl[role];
    if(!p){el.textContent='— waiting';el.className='player-slot empty';}
    else if(p.uid===myUid||role===myRole){el.textContent=p.nick+' (YOU)';el.className='player-slot me';}
    else{el.textContent=p.nick;el.className='player-slot other';}
  });
}

window.leaveWaiting=function(){
  if(waitingUnsub){waitingUnsub();waitingUnsub=null;}
  if(roomId&&myRole){
    // Remove my slot
    remove(ref(db,`rooms2v2/${roomId}/players/${myRole}`));
    if(myRole==='p1') remove(roomRef2(roomId)); // host leaves = delete room
  }
  if(publicInterval){clearInterval(publicInterval);remove(ref(db,`public2v2/${roomId}`));}
  roomId=null; myRole=null;
  show('screen-lobby');setStatus('','');
};

// ── Game ──────────────────────────────────────────────────────
async function beginGame(){
  const snap=await get(ref(db,`rooms2v2/${roomId}/players`));
  players=snap.val()||{};
  scoreL=0; scoreR=0; rematchVotes=0;
  leftY=H/2-PH/2; rightY=H/2-PH/2;
  p1Y=0; p2Y=HALF; p3Y=0; p4Y=HALF;
  ball=makeBall(1); paused=true; running=true;

  document.getElementById('score-l').textContent='0';
  document.getElementById('score-r').textContent='0';
  document.getElementById('chat-messages').innerHTML='';
  document.getElementById('players-l').innerHTML=
    [players.p1?.nick||'—', players.p2?.nick||'—'].map(n=>esc(n)).join('<br>');
  document.getElementById('players-r').innerHTML=
    [players.p3?.nick||'—', players.p4?.nick||'—'].map(n=>esc(n)).join('<br>');

  // Role hint
  const roleHints={
    p1:'YOU control the TOP of the LEFT paddle',
    p2:'YOU control the BOTTOM of the LEFT paddle',
    p3:'YOU control the TOP of the RIGHT paddle',
    p4:'YOU control the BOTTOM of the RIGHT paddle'
  };
  document.getElementById('role-hint').textContent=roleHints[myRole]||'';
  setGStatus('PRESS SPACE');
  show('screen-game');

  subscribeChatForGame();
  appendChatMsg('','Game started! 4 players connected.','',true);

  // Subscribe to all inputs except my own
  const allRoles=['p1','p2','p3','p4'];
  // Unsubscribe previous
  [inputUnsubP1,inputUnsubP2,inputUnsubP3,inputUnsubP4].forEach(u=>{if(u)u();});

  allRoles.filter(r=>r!==myRole).forEach(r=>{
    const unsub=onValue(inputRef2(roomId,r),snap=>{
      const v=snap.val(); if(v==null) return;
      if(r==='p1') p1Y=v;
      if(r==='p2') p2Y=v;
      if(r==='p3') p3Y=v;
      if(r==='p4') p4Y=v;
      recomputePaddles();
    });
    if(r==='p1') inputUnsubP1=unsub;
    if(r==='p2') inputUnsubP2=unsub;
    if(r==='p3') inputUnsubP3=unsub;
    if(r==='p4') inputUnsubP4=unsub;
  });

  // Non-p1 players listen to authoritative state
  if(myRole!=='p1'){
    if(stateUnsub){stateUnsub();stateUnsub=null;}
    stateUnsub=onValue(stateRef2(roomId),snap=>{
      const s=snap.val(); if(!s||!running)return;
      ball={x:s.bx,y:s.by,vx:s.bvx,vy:s.bvy,spd:s.bspd};
      leftY=s.ly; rightY=s.ry;
      if(scoreL!==s.sl||scoreR!==s.sr){scoreL=s.sl;scoreR=s.sr;updateScores();}
      paused=s.paused;
      if(s.status!=null)setGStatus(s.status);
      if(running&&(scoreL>=WIN||scoreR>=WIN)){running=false;cancelAnimationFrame(rafId);showWin();}
    });
  }

  // Signal listener
  if(signalUnsub){signalUnsub();signalUnsub=null;}
  signalUnsub=onValue(ref(db,`rooms2v2/${roomId}/signal`),snap=>{
    const v=snap.val(); if(!v)return;
    if(v.startsWith('rematch-')){
      const n=parseInt(v.split('-')[1]);
      rematchVotes=n;
      if(n>=4)restartGame();
      else document.getElementById('wbtn-rematch').textContent='('+n+'/4) WAITING...';
    }
    if(v==='bye'){running=false;cancelAnimationFrame(rafId);setGStatus('A PLAYER LEFT');appendChatMsg('','A player left the game.','',true);}
  });

  cancelAnimationFrame(rafId);
  lastTick=performance.now(); accumulator=0;
  rafId=requestAnimationFrame(loop);
}

function recomputePaddles(){
  // Left paddle: p1 controls top, p2 controls bottom
  // Each sub-paddle is HALF px tall
  // Full paddle top = average of p1Y (top of p1 half) and p2Y-HALF (estimated top from p2)
  // Simpler: just keep p1Y and p2Y as absolute Y positions of each half
  // leftY = min of p1Y, so it anchors correctly
  leftY  = Math.max(0, Math.min(H-PH, Math.min(p1Y, p2Y)));
  rightY = Math.max(0, Math.min(H-PH, Math.min(p3Y, p4Y)));
}

function makeBall(dir){const a=(Math.random()*0.6-0.3),spd=5;return{x:W/2-BS/2,y:H/2-BS/2,vx:dir*spd*Math.cos(a),vy:spd*Math.sin(a),spd};}

function loop(now){
  if(!running){draw();return;}
  const dt=Math.min(now-lastTick,100); lastTick=now;
  if(!paused){accumulator+=dt;while(accumulator>=TICK){tick();accumulator-=TICK;}}
  // Send my input
  let myOffset;
  if(myRole==='p1'||myRole==='p3') myOffset=applyTopInput();
  else myOffset=applyBottomInput();
  set(inputRef2(roomId,myRole),myOffset);
  draw();
  rafId=requestAnimationFrame(loop);
}

function applyTopInput(){
  // Controls top half of paddle — moves within [0, H-PH]
  const up=keys['ArrowUp']||touch.up, dn=keys['ArrowDown']||touch.down;
  if(myRole==='p1'){
    if(up&&p1Y>0)p1Y-=6; if(dn&&p1Y<H-PH)p1Y+=6;
    // Keep p2 snapped below p1
    p2Y=Math.max(p1Y+HALF,Math.min(H-HALF,p2Y));
    recomputePaddles(); return p1Y;
  } else {
    if(up&&p3Y>0)p3Y-=6; if(dn&&p3Y<H-PH)p3Y+=6;
    p4Y=Math.max(p3Y+HALF,Math.min(H-HALF,p4Y));
    recomputePaddles(); return p3Y;
  }
}

function applyBottomInput(){
  // Controls bottom half — moves within [HALF, H-HALF]
  const up=keys['ArrowUp']||touch.up, dn=keys['ArrowDown']||touch.down;
  if(myRole==='p2'){
    if(up&&p2Y>HALF)p2Y-=6; if(dn&&p2Y<H-HALF)p2Y+=6;
    // Keep p1 above p2
    p1Y=Math.min(p2Y-HALF,Math.max(0,p1Y));
    recomputePaddles(); return p2Y;
  } else {
    if(up&&p4Y>HALF)p4Y-=6; if(dn&&p4Y<H-HALF)p4Y+=6;
    p3Y=Math.min(p4Y-HALF,Math.max(0,p3Y));
    recomputePaddles(); return p4Y;
  }
}

function tick(){
  if(myRole!=='p1')return; // only host runs physics

  ball.x+=ball.vx; ball.y+=ball.vy;
  if(ball.y<=0){ball.y=0;ball.vy=Math.abs(ball.vy);}
  if(ball.y+BS>=H){ball.y=H-BS;ball.vy=-Math.abs(ball.vy);}

  function hit(px,py,side){
    if(ball.x+BS>px&&ball.x<px+PW&&ball.y+BS>py&&ball.y<py+PH){
      const rel=(ball.y+BS/2-py)/PH,ang=(rel-0.5)*Math.PI*0.55;
      ball.spd=Math.min(ball.spd+0.25,15);
      ball.vx=side*ball.spd*Math.cos(ang); ball.vy=ball.spd*Math.sin(ang);
      ball.x=(side===1)?px+PW:px-BS;
    }
  }
  hit(20,leftY,1); hit(W-20-PW,rightY,-1);

  let scored=false;
  if(ball.x+BS<0){scoreR++;scored=true;if(!checkWin()){ball=makeBall(1);paused=true;setGStatus('PRESS SPACE');}}
  if(ball.x>W)   {scoreL++;scored=true;if(!checkWin()){ball=makeBall(-1);paused=true;setGStatus('PRESS SPACE');}}
  if(scored)updateScores();

  set(stateRef2(roomId),{
    bx:ball.x,by:ball.y,bvx:ball.vx,bvy:ball.vy,bspd:ball.spd,
    ly:leftY,ry:rightY,sl:scoreL,sr:scoreR,
    paused,status:document.getElementById('g-status').textContent
  });
}

function togglePause(){
  if(!running)return; paused=!paused; setGStatus(paused?'PAUSED':'');
  if(myRole==='p1') set(stateRef2(roomId),{
    bx:ball.x,by:ball.y,bvx:ball.vx,bvy:ball.vy,bspd:ball.spd,
    ly:leftY,ry:rightY,sl:scoreL,sr:scoreR,
    paused,status:paused?'PAUSED':''
  });
}

function updateScores(){
  document.getElementById('score-l').textContent=scoreL;
  document.getElementById('score-r').textContent=scoreR;
}

function checkWin(){
  if(scoreL>=WIN||scoreR>=WIN){
    running=false;cancelAnimationFrame(rafId);
    set(stateRef2(roomId),{bx:W/2,by:H/2,bvx:0,bvy:0,bspd:0,ly:leftY,ry:rightY,sl:scoreL,sr:scoreR,paused:true,status:''});
    showWin();return true;
  }return false;
}

function showWin(){
  const leftWon=scoreL>=WIN;
  document.getElementById('win-title').textContent=leftWon?'LEFT WINS!':'RIGHT WINS!';
  document.getElementById('win-score').textContent=scoreL+' — '+scoreR;
  document.getElementById('wbtn-rematch').textContent='REMATCH';
  show('screen-win');
}

function restartGame(){
  scoreL=0;scoreR=0;rematchVotes=0;
  leftY=H/2-PH/2;rightY=H/2-PH/2;
  p1Y=0;p2Y=HALF;p3Y=0;p4Y=HALF;
  ball=makeBall(1);paused=true;running=true;
  document.getElementById('score-l').textContent='0';
  document.getElementById('score-r').textContent='0';
  document.getElementById('wbtn-rematch').textContent='REMATCH';
  setGStatus('PRESS SPACE');
  show('screen-game');
  update(ref(db,`rooms2v2/${roomId}`),{signal:null});
  cancelAnimationFrame(rafId);lastTick=performance.now();accumulator=0;
  rafId=requestAnimationFrame(loop);
}

window.requestRematch=function(){
  rematchVotes++;
  const val='rematch-'+rematchVotes;
  update(ref(db,`rooms2v2/${roomId}`),{signal:val});
  if(rematchVotes>=4)restartGame();
  else document.getElementById('wbtn-rematch').textContent='('+rematchVotes+'/4) WAITING...';
};

window.leaveGame=function(){
  running=false;cancelAnimationFrame(rafId);
  [stateUnsub,inputUnsubP1,inputUnsubP2,inputUnsubP3,inputUnsubP4,signalUnsub,chatUnsub,waitingUnsub,playersUnsub]
    .forEach(u=>{if(u)u();});
  stateUnsub=inputUnsubP1=inputUnsubP2=inputUnsubP3=inputUnsubP4=signalUnsub=chatUnsub=waitingUnsub=playersUnsub=null;
  if(roomId) update(ref(db,`rooms2v2/${roomId}`),{signal:'bye'});
  clearInterval(publicInterval);
  show('screen-lobby');setStatus('','');
};

// ── Chat ──────────────────────────────────────────────────────
let lastChatKey=null;
function subscribeChatForGame(){
  if(chatUnsub){chatUnsub();chatUnsub=null;}
  lastChatKey=null;
  const firstLoad=Date.now();
  chatUnsub=onValue(chatRef2(roomId),snap=>{
    if(!snap.exists())return;
    snap.forEach(child=>{
      const k=child.key,d=child.val();
      if(k<=lastChatKey)return; lastChatKey=k;
      if((d.ts||0)<firstLoad-2000)return;
      appendChatMsg(d.sender,d.text,d.uid===currentUser?.uid);
    });
  });
}
function appendChatMsg(sender,text,isMe,system=false){
  const box=document.getElementById('chat-messages');
  const div=document.createElement('div');
  div.className='chat-msg'+(system?' system':'');
  if(!system)div.innerHTML=`<div class="sender${isMe?' me':''}">${esc(sender)}</div><div class="text">${esc(text)}</div>`;
  else div.innerHTML=`<div class="text">${esc(text)}</div>`;
  box.appendChild(div);box.scrollTop=box.scrollHeight;
}
window.sendChat=function(){
  const input=document.getElementById('chat-input');
  const text=input.value.trim();
  if(!text||!roomId)return;
  input.value='';
  push(chatRef2(roomId),{sender:myNick,text,uid:currentUser?.uid||'anon',ts:Date.now()});
};
document.getElementById('chat-input').addEventListener('keydown',e=>{
  if(e.key==='Enter'){e.preventDefault();window.sendChat();}
});

// ── Draw ──────────────────────────────────────────────────────
const canvas=document.getElementById('canvas');
const ctx=canvas.getContext('2d');

function draw(){
  ctx.fillStyle='#000'; ctx.fillRect(0,0,W,H);
  // Center line
  ctx.setLineDash([8,12]); ctx.strokeStyle='#333'; ctx.lineWidth=2;
  ctx.beginPath();ctx.moveTo(W/2,0);ctx.lineTo(W/2,H);ctx.stroke();
  ctx.setLineDash([]);

  // Left paddle — draw in 2 halves to show split
  const myUid=currentUser?.uid;
  const isLeftTeam=myRole==='p1'||myRole==='p2';
  const isRightTeam=myRole==='p3'||myRole==='p4';

  // Top half of left paddle
  ctx.fillStyle='#fff';
  ctx.fillRect(20, leftY, PW, HALF);
  // Bottom half of left paddle
  ctx.fillStyle='#fff';
  ctx.fillRect(20, leftY+HALF, PW, HALF);
  // Dividing line in the middle of paddles
  ctx.fillStyle='#000';
  ctx.fillRect(20, leftY+HALF-1, PW, 2);

  // Top half of right paddle
  ctx.fillStyle='#fff';
  ctx.fillRect(W-20-PW, rightY, PW, HALF);
  // Bottom half of right paddle
  ctx.fillStyle='#fff';
  ctx.fillRect(W-20-PW, rightY+HALF, PW, HALF);
  ctx.fillStyle='#000';
  ctx.fillRect(W-20-PW, rightY+HALF-1, PW, 2);

  // Highlight MY half
  if(myRole==='p1'){ctx.fillStyle='#fff';ctx.fillRect(22,p1Y,PW-4,HALF);}
  if(myRole==='p2'){ctx.fillStyle='#fff';ctx.fillRect(22,p2Y,PW-4,HALF);}
  if(myRole==='p3'){ctx.fillStyle='#fff';ctx.fillRect(W-20-PW+2,p3Y,PW-4,HALF);}
  if(myRole==='p4'){ctx.fillStyle='#fff';ctx.fillRect(W-20-PW+2,p4Y,PW-4,HALF);}

  // Ball
  if(ball) ctx.fillStyle='#fff', ctx.fillRect(Math.round(ball.x),Math.round(ball.y),BS,BS);
}
draw();
</script>
