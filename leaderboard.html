<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>PONG — LEADERBOARD</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:#000;color:#fff;font-family:monospace;padding:32px 16px;display:flex;justify-content:center;}
  .wrap{display:flex;flex-direction:column;align-items:center;gap:22px;width:100%;max-width:560px;}
  h1{font-size:clamp(36px,10vw,56px);font-weight:900;letter-spacing:10px;}
  .sub{font-size:11px;color:#555;letter-spacing:3px;margin-top:-14px;}

  .user-bar{display:flex;justify-content:space-between;align-items:center;width:100%;padding:8px 12px;border:1px solid #222;font-size:11px;}
  .badge-verified{color:#5f5;font-size:10px;letter-spacing:1px;}
  .badge-anon{color:#f80;font-size:10px;letter-spacing:1px;}

  .my-stats{display:flex;width:100%;border:2px solid #fff;}
  .stat{flex:1;padding:14px 8px;text-align:center;border-right:1px solid #333;}
  .stat:last-child{border-right:none;}
  .stat-num{font-size:clamp(24px,6vw,36px);font-weight:900;}
  .stat-lbl{font-size:10px;color:#888;letter-spacing:2px;margin-top:4px;}

  .tbl-head{display:grid;grid-template-columns:44px 1fr 60px 60px 60px 60px;width:100%;padding:8px 10px;font-size:10px;color:#555;letter-spacing:2px;border-bottom:1px solid #222;}
  .tbl-head span:nth-child(n+3){text-align:right;}
  .row{display:grid;grid-template-columns:44px 1fr 60px 60px 60px 60px;width:100%;padding:10px 10px;border-bottom:1px solid #111;font-size:12px;align-items:center;}
  .row.me{background:#111;}
  .rank{font-size:15px;font-weight:900;}
  .nick{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;padding-right:8px;}
  .col-r{text-align:right;}
  .wins{color:#5f5;}
  .losses{color:#f55;}
  .ratio{color:#aaa;}
  .provider{color:#555;font-size:10px;}
  .empty{font-size:11px;color:#555;text-align:center;padding:28px;line-height:2;}

  /* debug box */
  #debug{width:100%;padding:12px;border:1px solid #333;background:#0a0a0a;font-size:10px;color:#888;line-height:1.8;display:none;white-space:pre-wrap;word-break:break-all;}
  #debug.visible{display:block;}
  #debug .err{color:#f55;}
  #debug .ok{color:#5f5;}
  #debug .warn{color:#f80;}

  .nav{display:flex;gap:10px;width:100%;}
  .nav-btn{flex:1;padding:11px;font-family:monospace;font-size:11px;letter-spacing:2px;cursor:pointer;border:2px solid #fff;background:#000;color:#fff;text-align:center;text-decoration:none;display:block;}
  .nav-btn:hover{background:#fff;color:#000;}
  .nav-btn.solid{background:#fff;color:#000;}
  .nav-btn.solid:hover{background:#ccc;}

  .note{font-size:10px;color:#333;letter-spacing:1px;text-align:center;line-height:1.8;}
  .loading{font-size:11px;color:#555;letter-spacing:2px;text-align:center;}
  .anon-banner{width:100%;padding:14px;border:2px solid #f80;color:#f80;font-size:11px;letter-spacing:2px;text-align:center;line-height:2;}
  .anon-banner a{color:#fff;text-decoration:none;}

  .debug-toggle{font-size:10px;color:#333;cursor:pointer;letter-spacing:1px;}
  .debug-toggle:hover{color:#888;}
</style>
</head>
<body>
<div class="wrap">
  <h1>RANK</h1>
  <p class="sub">GLOBAL LEADERBOARD</p>

  <div id="loading" class="loading">Loading...</div>
  <div id="anon-banner" class="anon-banner" style="display:none">
    You're anonymous — <a href="auth.html">sign in with Google, GitHub or Discord</a><br>to appear in the leaderboard.
  </div>
  <div class="user-bar" id="user-bar" style="display:none">
    <span id="bar-nick">—</span>
    <span id="bar-badge">—</span>
  </div>
  <div class="my-stats" id="my-stats" style="display:none">
    <div class="stat"><div class="stat-num" id="my-wins">0</div><div class="stat-lbl">WINS</div></div>
    <div class="stat"><div class="stat-num" id="my-losses">0</div><div class="stat-lbl">LOSSES</div></div>
    <div class="stat"><div class="stat-num" id="my-ratio">—</div><div class="stat-lbl">W/L</div></div>
    <div class="stat"><div class="stat-num" id="my-rank">—</div><div class="stat-lbl">RANK</div></div>
  </div>

  <div id="lb-wrap" style="width:100%;display:none">
    <div class="tbl-head">
      <span>#</span><span>PLAYER</span>
      <span style="text-align:right">WIN</span>
      <span style="text-align:right">LOSS</span>
      <span style="text-align:right">W/L</span>
      <span style="text-align:right">VIA</span>
    </div>
    <div id="lb-rows"></div>
  </div>

  <p class="note">Google / GitHub / Discord users appear here.</p>

  <!-- Debug panel — shows what's happening -->
  <span class="debug-toggle" onclick="toggleDebug()">▸ show debug info</span>
  <div id="debug"></div>

  <div class="nav">
    <a class="nav-btn" href="index.html">← BACK</a>
    <a class="nav-btn solid" href="online.html">PLAY ONLINE</a>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, get } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const firebaseConfig = {
  apiKey:            "AIzaSyDyZcVPRTMk8_k0Kr_prqNZ6bZlbGq1oV4",
  authDomain:        "pong-online-18210.firebaseapp.com",
  databaseURL:       "https://pong-online-18210-default-rtdb.firebaseio.com",
  projectId:         "pong-online-18210",
  storageBucket:     "pong-online-18210.firebasestorage.app",
  messagingSenderId: "897676900222",
  appId:             "1:897676900222:web:7933fd119d9b573b9d252f"
};

// ── Debug logger ──────────────────────────────────────────────
const dbgEl = document.getElementById('debug');
function log(msg, cls='') {
  const line = document.createElement('div');
  line.className = cls;
  line.textContent = msg;
  dbgEl.appendChild(line);
  console.log('[LB]', msg);
}
window.toggleDebug = () => {
  dbgEl.classList.toggle('visible');
  document.querySelector('.debug-toggle').textContent =
    dbgEl.classList.contains('visible') ? '▾ hide debug info' : '▸ show debug info';
};

const app  = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db   = getDatabase(app);

function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function ratio(w,l){ return l===0 ? (w>0?'∞':'—') : (w/l).toFixed(2); }
function providerIcon(p){
  if(!p||p==='anonymous') return '👤';
  if(p.includes('google'))  return '🔵';
  if(p.includes('github'))  return '⚫';
  if(p.includes('discord')) return '🟣';
  return '—';
}

let currentUid = null;

onAuthStateChanged(auth, async user => {
  currentUid = user ? user.uid : null;
  log('Auth state: ' + (user ? 'logged in uid=' + user.uid : 'not logged in'));

  if (user) {
    log('Fetching own profile...');
    try {
      const snap = await get(ref(db, `users/${user.uid}`));
      if (snap.exists()) {
        const d = snap.val();
        log('Own profile: ' + JSON.stringify(d), 'ok');
        const nick     = d.nickname || user.displayName || 'Player';
        const verified = d.verified === true;

        document.getElementById('user-bar').style.display = 'flex';
        document.getElementById('bar-nick').textContent   = nick;
        const badge = document.getElementById('bar-badge');
        if (verified) {
          badge.textContent = '✓ VERIFIED';
          badge.className   = 'badge-verified';
          const w = d.wins   || 0;
          const l = d.losses || 0;
          document.getElementById('my-stats').style.display  = 'flex';
          document.getElementById('my-wins').textContent    = w;
          document.getElementById('my-losses').textContent  = l;
          document.getElementById('my-ratio').textContent   = ratio(w, l);
        } else {
          badge.textContent = 'ANONYMOUS';
          badge.className   = 'badge-anon';
          document.getElementById('anon-banner').style.display = 'block';
        }
      } else {
        log('Own profile NOT found in DB', 'warn');
      }
    } catch (e) {
      log('Error fetching own profile: ' + e.message, 'err');
    }
  }

  await loadLeaderboard();
  document.getElementById('loading').style.display = 'none';
});

async function loadLeaderboard() {
  log('Fetching /users from Firebase...');
  try {
    const snap = await get(ref(db, 'users'));
    log('Fetch result: exists=' + snap.exists());

    if (!snap.exists() || !snap.val()) {
      log('No users in DB yet.', 'warn');
      document.getElementById('lb-rows').innerHTML = '<div class="empty">No players yet.<br>Be the first!</div>';
      document.getElementById('lb-wrap').style.display = 'block';
      return;
    }

    const all = Object.entries(snap.val()).map(([uid, d]) => ({ uid, ...d }));
    log('Total users in DB: ' + all.length);

    const verified = all.filter(p => p.verified === true);
    log('Verified users: ' + verified.length, verified.length > 0 ? 'ok' : 'warn');

    if (verified.length === 0) {
      log('No verified users found. Check that verified=true is saved correctly for Google/GitHub/Discord users.', 'warn');
      // Show ALL users for debugging (remove this in production)
      log('All users dump:', 'warn');
      all.forEach(p => log(`  uid=${p.uid} verified=${p.verified} nick=${p.nickname} provider=${p.provider}`, 'warn'));

      document.getElementById('lb-rows').innerHTML =
        '<div class="empty">No verified players yet.<br>Sign in with Google, GitHub or Discord.</div>';
      document.getElementById('lb-wrap').style.display = 'block';
      return;
    }

    verified.sort((a, b) => {
      const wa=a.wins||0, la=a.losses||0, wb=b.wins||0, lb=b.losses||0;
      if (wb !== wa) return wb - wa;
      const ra = la===0?(wa>0?9999:0):wa/la;
      const rb = lb===0?(wb>0?9999:0):wb/lb;
      return rb - ra;
    });

    const rowsEl = document.getElementById('lb-rows');
    rowsEl.innerHTML = '';
    verified.forEach((p, i) => {
      const w = p.wins   || 0;
      const l = p.losses || 0;
      const r = ratio(w, l);
      const isMe = currentUid && p.uid === currentUid;
      const medal = i===0?'🥇':i===1?'🥈':i===2?'🥉':'#'+(i+1);

      const row = document.createElement('div');
      row.className = 'row' + (isMe ? ' me' : '');
      row.innerHTML = `
        <span class="rank">${medal}</span>
        <span class="nick">${esc(p.nickname||'Player')}${isMe?' ◀':''}</span>
        <span class="col-r wins">${w}</span>
        <span class="col-r losses">${l}</span>
        <span class="col-r ratio">${r}</span>
        <span class="col-r provider">${providerIcon(p.provider)}</span>`;
      rowsEl.appendChild(row);

      if (isMe) document.getElementById('my-rank').textContent = '#'+(i+1);
    });

    document.getElementById('lb-wrap').style.display = 'block';
    log('Leaderboard rendered with ' + verified.length + ' players.', 'ok');

  } catch (e) {
    log('FETCH ERROR: ' + e.message, 'err');
    log('This is likely a Firebase Rules problem. Make sure /users has ".read": true at the root level.', 'err');
    document.getElementById('lb-rows').innerHTML =
      `<div class="empty">Error loading leaderboard.<br>Check debug panel below.</div>`;
    document.getElementById('lb-wrap').style.display = 'block';
    // Auto-show debug on error
    dbgEl.classList.add('visible');
  }
}
</script>
</body>
</html>
