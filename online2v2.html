<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>PONG — 2v2</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{background:#000;color:#fff;display:flex;justify-content:center;align-items:center;min-height:100vh;font-family:monospace;padding:8px;overflow:hidden;}
.screen{display:none;flex-direction:column;align-items:center;gap:14px;width:100%;max-width:800px;}
.screen.active{display:flex;}
h1{font-size:clamp(36px,9vw,60px);font-weight:900;letter-spacing:8px;}
.sub{font-size:11px;color:#555;letter-spacing:3px;margin-top:-12px;}
.user-bar{display:flex;justify-content:space-between;align-items:center;width:100%;max-width:380px;padding:8px 12px;border:1px solid #222;font-size:11px;}
.user-nick{letter-spacing:1px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:200px;}
.user-link{color:#888;font-size:10px;cursor:pointer;background:none;border:none;font-family:monospace;letter-spacing:1px;}
.user-link:hover{color:#fff;}
.tabs{display:flex;width:100%;max-width:380px;}
.tab{flex:1;padding:10px;text-align:center;font-family:monospace;font-size:12px;letter-spacing:2px;cursor:pointer;border:2px solid #fff;background:#000;color:#fff;}
.tab+.tab{border-left:none;}
.tab.active{background:#fff;color:#000;}
.panel{width:100%;max-width:380px;border:2px solid #fff;border-top:none;padding:16px;display:flex;flex-direction:column;gap:10px;}
.panel-label{font-size:10px;color:#888;letter-spacing:3px;}
.code-box{font-size:26px;font-weight:900;letter-spacing:8px;text-align:center;padding:10px;border:2px solid #555;background:#111;min-height:50px;display:flex;align-items:center;justify-content:center;}
.code-box.dim{font-size:12px;color:#555;letter-spacing:2px;font-weight:normal;}
input[type=text]{width:100%;padding:10px;background:#111;border:2px solid #555;color:#fff;font-family:monospace;font-size:15px;letter-spacing:4px;text-transform:uppercase;text-align:center;}
input[type=text]:focus{outline:none;border-color:#fff;}
input[type=text]::placeholder{color:#333;font-size:11px;letter-spacing:2px;}
.btn{width:100%;padding:11px;background:#fff;color:#000;border:none;font-family:monospace;font-size:12px;font-weight:700;letter-spacing:3px;cursor:pointer;touch-action:manipulation;}
.btn:hover,.btn:active{background:#ccc;}
.btn.outline{background:#000;color:#fff;border:2px solid #fff;}
.btn.outline:hover,.btn.outline:active{background:#fff;color:#000;}
.btn.sm{font-size:11px;padding:8px;}
#room-list{display:flex;flex-direction:column;gap:6px;max-height:130px;overflow-y:auto;}
.room-empty{font-size:11px;color:#555;text-align:center;padding:8px;}
.room-row{display:flex;justify-content:space-between;align-items:center;padding:8px 10px;border:1px solid #333;}
.room-code{font-size:13px;letter-spacing:3px;}
.join-r{padding:4px 12px;background:#fff;color:#000;border:none;font-family:monospace;font-size:10px;cursor:pointer;touch-action:manipulation;}
#lobby-status{font-size:11px;letter-spacing:2px;text-align:center;min-height:16px;color:#888;}
#lobby-status.err{color:#f55;}
#lobby-status.ok{color:#5f5;}
.back-link{font-size:11px;color:#444;text-decoration:none;letter-spacing:2px;}
.back-link:hover{color:#fff;}

/* waiting room */
.waiting-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;width:100%;max-width:380px;}
.team-box{border:2px solid #333;padding:12px;display:flex;flex-direction:column;gap:6px;}
.team-title{font-size:10px;letter-spacing:3px;color:#888;}
.player-slot{font-size:12px;padding:5px 0;border-bottom:1px solid #111;min-height:26px;}
.player-slot.empty{color:#444;}
.player-slot.me{color:#fff;}
.player-slot.other{color:#aaa;}
#waiting-status{font-size:11px;color:#888;letter-spacing:2px;text-align:center;}

/* game */
#screen-game{flex-direction:row;flex-wrap:wrap;align-items:flex-start;justify-content:center;gap:8px;padding:4px;max-width:1060px;}
.game-main{display:flex;flex-direction:column;gap:6px;flex:1;min-width:0;}
.scoreboard{display:flex;justify-content:space-between;align-items:center;width:100%;}
.score-box{text-align:center;min-width:80px;}
.score-num{font-size:clamp(22px,5vw,44px);font-weight:900;}
.score-players{font-size:9px;color:#555;letter-spacing:1px;line-height:1.6;}
#g-status{font-size:11px;color:#888;letter-spacing:2px;text-align:center;flex:1;padding:0 6px;}
#canvas-wrap{width:100%;touch-action:none;}
canvas{display:block;width:100%;height:auto;border:2px solid #fff;touch-action:none;}
.role-hint{font-size:10px;color:#555;text-align:center;letter-spacing:2px;padding:2px;}
/* touch controls */
.touch-row{display:flex;width:100%;gap:8px;}
.touch-btn{flex:1;height:64px;background:#111;border:2px solid #fff;font-size:22px;cursor:pointer;touch-action:manipulation;user-select:none;-webkit-user-select:none;display:flex;align-items:center;justify-content:center;}
.touch-btn:active,.touch-btn.pressed{background:#333;}
@media(hover:hover) and (pointer:fine){.touch-row{display:none;}}
.gfooter{display:flex;justify-content:space-between;align-items:center;width:100%;}
.gfooter-btn{padding:6px 14px;border:2px solid #fff;background:#000;color:#fff;font-family:monospace;font-size:11px;letter-spacing:2px;cursor:pointer;touch-action:manipulation;}
.gfooter-btn:hover,.gfooter-btn:active{background:#fff;color:#000;}
.gfooter-hint{font-size:10px;color:#444;}
/* chat */
.chat-panel{display:flex;flex-direction:column;width:200px;border:2px solid #333;flex-shrink:0;}
.chat-title{font-size:10px;letter-spacing:3px;padding:7px 10px;border-bottom:1px solid #333;color:#888;}
.chat-msgs{overflow-y:auto;padding:8px;display:flex;flex-direction:column;gap:5px;min-height:150px;max-height:340px;}
.chat-msgs::-webkit-scrollbar{width:3px;}
.chat-msgs::-webkit-scrollbar-thumb{background:#333;}
.chat-msg{font-size:11px;line-height:1.4;word-break:break-word;}
.chat-msg .sndr{color:#888;font-size:10px;}
.chat-msg .sndr.me{color:#fff;}
.chat-msg .txt{color:#ccc;}
.chat-msg.sys .txt{color:#444;font-style:italic;}
.chat-row{display:flex;border-top:1px solid #333;}
.chat-in{flex:1;padding:7px;background:#000;border:none;color:#fff;font-family:monospace;font-size:12px;outline:none;}
.chat-in::placeholder{color:#333;}
.chat-snd{padding:7px 9px;background:#fff;color:#000;border:none;font-family:monospace;font-size:11px;font-weight:700;cursor:pointer;}
.chat-snd:hover{background:#ccc;}
@media(max-width:680px){
  .chat-panel{width:100%;min-height:unset;}
  .chat-msgs{max-height:80px;min-height:60px;}
}
/* win */
#win-title{font-size:clamp(28px,8vw,48px);font-weight:900;letter-spacing:6px;}
#win-score{font-size:18px;color:#888;}
.win-btns{display:flex;gap:12px;flex-wrap:wrap;justify-content:center;}
.win-btn{padding:12px 22px;font-family:monospace;font-size:12px;letter-spacing:2px;cursor:pointer;border:2px solid #fff;touch-action:manipulation;}
#wbtn-rematch{background:#fff;color:#000;}
#wbtn-rematch:hover{background:#ccc;}
#wbtn-lobby{background:#000;color:#fff;}
#wbtn-lobby:hover{background:#fff;color:#000;}
</style>
</head>
<body>

<!-- LOBBY -->
<div id="screen-lobby" class="screen active">
  <h1>2v2</h1>
  <p class="sub">ONLINE CO-OP</p>
  <div class="user-bar" id="user-bar" style="display:none">
    <span class="user-nick" id="bar-nick">—</span>
    <button class="user-link" id="bar-signout">SIGN OUT</button>
  </div>
  <div class="tabs">
    <div class="tab active" id="tab-private" onclick="switchTab('private')">PRIVATE</div>
    <div class="tab"        id="tab-public"  onclick="switchTab('public')">PUBLIC</div>
  </div>
  <div class="panel" id="panel-private">
    <div class="panel-label">CREATE ROOM</div>
    <div class="code-box dim" id="my-code">—</div>
    <button class="btn sm" id="btn-create" onclick="createPrivate()">CREATE ROOM</button>
    <button class="btn sm outline" onclick="copyCode()">COPY CODE</button>
    <div class="panel-label" style="margin-top:4px">JOIN ROOM</div>
    <input type="text" id="priv-input" maxlength="6" placeholder="ENTER CODE" autocomplete="off">
    <button class="btn" onclick="joinRoom()">JOIN</button>
  </div>
  <div class="panel" id="panel-public" style="display:none">
    <div class="panel-label">OPEN ROOMS</div>
    <div id="room-list"><div class="room-empty">Press refresh.</div></div>
    <button class="btn sm outline" onclick="refreshRooms()">↻ REFRESH</button>
    <div class="panel-label" style="margin-top:4px">OR CREATE</div>
    <button class="btn" onclick="createPublic()">CREATE PUBLIC ROOM</button>
  </div>
  <div id="lobby-status"></div>
  <p style="font-size:10px;color:#333;letter-spacing:1px;text-align:center">4 players — each controls half a paddle</p>
  <a href="index.html" class="back-link">← BACK</a>
</div>

<!-- WAITING -->
<div id="screen-waiting" class="screen">
  <h1>2v2</h1>
  <p class="sub" id="wait-code-lbl">ROOM: —</p>
  <div class="waiting-grid">
    <div class="team-box">
      <div class="team-title">TEAM LEFT</div>
      <div class="player-slot empty" id="slot-p1">— waiting</div>
      <div class="player-slot empty" id="slot-p2">— waiting</div>
    </div>
    <div class="team-box">
      <div class="team-title">TEAM RIGHT</div>
      <div class="player-slot empty" id="slot-p3">— waiting</div>
      <div class="player-slot empty" id="slot-p4">— waiting</div>
    </div>
  </div>
  <div id="waiting-status">Waiting for players (1/4)...</div>
  <button class="btn outline" style="max-width:200px" onclick="copyWaitCode()">COPY CODE</button>
  <button class="btn outline" style="max-width:200px" onclick="leaveWaiting()">← LEAVE</button>
</div>

<!-- GAME -->
<div id="screen-game" class="screen">
  <div class="game-main">
    <div class="scoreboard">
      <div class="score-box">
        <div id="score-l" class="score-num">0</div>
        <div class="score-players" id="players-l">—</div>
      </div>
      <div id="g-status">—</div>
      <div class="score-box">
        <div id="score-r" class="score-num">0</div>
        <div class="score-players" id="players-r">—</div>
      </div>
    </div>
    <div id="canvas-wrap"><canvas id="canvas" width="760" height="480"></canvas></div>
    <div class="role-hint" id="role-hint"></div>
    <div class="touch-row">
      <button class="touch-btn" id="t-up">▲</button>
      <button class="touch-btn" id="t-down">▼</button>
    </div>
    <div class="gfooter">
      <button class="gfooter-btn" onclick="leaveGame()">← LOBBY</button>
      <span class="gfooter-hint">↑/↓ move &nbsp;|&nbsp; SPACE pause</span>
    </div>
  </div>
  <div class="chat-panel">
    <div class="chat-title">CHAT</div>
    <div class="chat-msgs" id="chat-msgs"></div>
    <div class="chat-row">
      <input class="chat-in" id="chat-in" placeholder="type..." maxlength="100" autocomplete="off">
      <button class="chat-snd" onclick="sendChat()">SEND</button>
    </div>
  </div>
</div>

<!-- WIN -->
<div id="screen-win" class="screen">
  <div id="win-title"></div>
  <div id="win-score"></div>
  <div class="win-btns">
    <button class="win-btn" id="wbtn-rematch" onclick="requestRematch()">REMATCH</button>
    <button class="win-btn" id="wbtn-lobby"   onclick="leaveGame()">LOBBY</button>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, set, get, push, onValue, remove, update, off }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";
import { getAuth, onAuthStateChanged, signOut }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const FC={apiKey:"AIzaSyDyZcVPRTMk8_k0Kr_prqNZ6bZlbGq1oV4",authDomain:"pong-online-18210.firebaseapp.com",databaseURL:"https://pong-online-18210-default-rtdb.firebaseio.com",projectId:"pong-online-18210",storageBucket:"pong-online-18210.firebasestorage.app",messagingSenderId:"897676900222",appId:"1:897676900222:web:7933fd119d9b573b9d252f"};
const fbApp=initializeApp(FC), db=getDatabase(fbApp), auth=getAuth(fbApp);

const W=760,H=480,PW=14,PH=160,BS=10,WIN=7,TICK=1000/60,SPEED=6;

// ── Auth — wait properly ──────────────────────────────────────
let currentUser=null;
let _authResolve;
const authReady=new Promise(r=>{_authResolve=r;});
let _authDone=false;
onAuthStateChanged(auth,async user=>{
  currentUser=user;
  if(!_authDone){_authDone=true;_authResolve();}
  if(user){
    const snap=await get(ref(db,`users/${user.uid}`));
    const nick=(snap.exists()&&snap.val().nickname)||user.displayName||'Player';
    document.getElementById('user-bar').style.display='flex';
    document.getElementById('bar-nick').textContent=nick;
  } else {
    document.getElementById('user-bar').style.display='none';
  }
});
document.getElementById('bar-signout').onclick=async()=>{await signOut(auth);window.location.href='auth.html';};

async function getNick(){
  await authReady;
  if(!currentUser) return 'Player';
  const snap=await get(ref(db,`users/${currentUser.uid}`));
  return (snap.exists()&&snap.val().nickname)||currentUser.displayName||'Player';
}

// ── Game vars ─────────────────────────────────────────────────
let myRole=null,myNick='Player',roomId=null,players={};
let running=false,paused=true,rafId=null,accumulator=0,lastTick=0,rematchVotes=0,publicInterval=null;
let leftY=H/2-PH/2,rightY=H/2-PH/2;
// Each player sends their directional input: -1 (up), 0 (still), +1 (down)
// The two teammates' inputs are summed to move the shared paddle
let inputL=0,inputR=0;   // combined input for left/right paddle this frame
let remoteInputs={p1:0,p2:0,p3:0,p4:0}; // last received from DB
let ball=null,scoreL=0,scoreR=0;

// ── Input ─────────────────────────────────────────────────────
const keys={};
document.addEventListener('keydown',e=>{
  keys[e.key]=true;
  if(e.key===' '){e.preventDefault();togglePause();}
});
document.addEventListener('keyup',e=>delete keys[e.key]);
const touch={up:false,dn:false};
function bindTouch(el,flag){
  el.addEventListener('touchstart',e=>{e.preventDefault();touch[flag]=true;el.classList.add('pressed');},{passive:false});
  el.addEventListener('touchend',  e=>{e.preventDefault();touch[flag]=false;el.classList.remove('pressed');},{passive:false});
  el.addEventListener('touchcancel',()=>{touch[flag]=false;el.classList.remove('pressed');});
  el.addEventListener('mousedown',e=>{e.preventDefault();touch[flag]=true;el.classList.add('pressed');});
  el.addEventListener('mouseup',  ()=>{touch[flag]=false;el.classList.remove('pressed');});
  el.addEventListener('mouseleave',()=>{touch[flag]=false;el.classList.remove('pressed');});
}
bindTouch(document.getElementById('t-up'),'up');
bindTouch(document.getElementById('t-down'),'dn');
document.getElementById('canvas').addEventListener('click',()=>togglePause());

// ── DB helpers ────────────────────────────────────────────────
const rRef =id=>ref(db,`rooms2v2/${id}`);
const stRef=id=>ref(db,`rooms2v2/${id}/state`);
const inRef=(id,r)=>ref(db,`rooms2v2/${id}/input/${r}`);
const chRef=id=>ref(db,`rooms2v2/${id}/chat`);
function rand(n=6){const c='ABCDEFGHJKLMNPQRSTUVWXYZ23456789';let s='';for(let i=0;i<n;i++)s+=c[Math.random()*c.length|0];return s;}

// ── UI ────────────────────────────────────────────────────────
function show(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active');window.scrollTo(0,0);}
function setStatus(m,c=''){const e=document.getElementById('lobby-status');e.textContent=m;e.className=c;}
function setGS(m){document.getElementById('g-status').textContent=m;}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

window.switchTab=function(t){
  ['private','public'].forEach(x=>{
    document.getElementById('tab-'+x).classList.toggle('active',t===x);
    document.getElementById('panel-'+x).style.display=t===x?'flex':'none';
  });
  if(t==='public')refreshRooms();
};
window.copyCode=function(){if(roomId)navigator.clipboard.writeText(roomId).then(()=>setStatus('Copied!','ok'));};
window.copyWaitCode=function(){if(roomId)navigator.clipboard.writeText(roomId).then(()=>{document.getElementById('waiting-status').textContent='Code copied!';});};

// ── Create / Join ─────────────────────────────────────────────
window.createPrivate=async function(){
  document.getElementById('btn-create').disabled=true;
  await authReady; // wait for auth before doing anything
  const id=rand();
  roomId=id; myRole='p1';
  myNick=await getNick();
  const ownerUid=currentUser?currentUser.uid:'anon_'+rand(8);
  await set(rRef(id),{
    ownerUid,created:Date.now(),mode:'private',
    players:{p1:{nick:myNick,uid:currentUser?.uid||'anon'}},
    state:null
  });
  document.getElementById('my-code').textContent=id;
  document.getElementById('my-code').classList.remove('dim');
  setStatus('Room '+id+' ready!','ok');
  document.getElementById('btn-create').disabled=false;
  enterWaiting();
};

window.joinRoom=async function(){
  const id=document.getElementById('priv-input').value.trim().toUpperCase();
  if(id.length<4){setStatus('Enter a valid code','err');return;}
  await doJoin(id);
};

async function doJoin(id){
  await authReady;
  const snap=await get(rRef(id));
  if(!snap.exists()){setStatus('Room not found','err');return;}
  const d=snap.val();
  const myUid=currentUser?.uid;
  if(myUid&&d.ownerUid===myUid){setStatus("Can't join your own room",'err');return;}
  const filled=Object.keys(d.players||{});
  if(filled.length>=4){setStatus('Room is full','err');return;}
  const slot=['p1','p2','p3','p4'].find(s=>!filled.includes(s));
  if(!slot){setStatus('Room is full','err');return;}
  roomId=id; myRole=slot;
  myNick=await getNick();
  await update(ref(db,`rooms2v2/${id}/players`),{
    [slot]:{nick:myNick,uid:myUid||'anon'}
  });
  setStatus('Joined!','ok');
  enterWaiting();
}

window.createPublic=async function(){
  await authReady;
  const id=rand();
  roomId=id; myRole='p1';
  myNick=await getNick();
  const ownerUid=currentUser?.uid||'anon_'+rand(8);
  const now=Date.now();
  await set(rRef(id),{ownerUid,created:now,mode:'public',players:{p1:{nick:myNick,uid:ownerUid}},state:null});
  await set(ref(db,`public2v2/${id}`),{id,created:now,ownerUid});
  document.getElementById('my-code').textContent=id;
  document.getElementById('my-code').classList.remove('dim');
  setStatus('Public room ready!','ok');
  publicInterval=setInterval(()=>set(ref(db,`public2v2/${id}/ts`),Date.now()),20000);
  enterWaiting();
};

window.refreshRooms=async function(){
  const el=document.getElementById('room-list');
  el.innerHTML='<div class="room-empty">Searching...</div>';
  const snap=await get(ref(db,'public2v2'));
  if(!snap.exists()){el.innerHTML='<div class="room-empty">No open rooms.</div>';return;}
  const myUid=currentUser?.uid;
  const rooms=Object.values(snap.val()||{}).filter(r=>Date.now()-r.created<120000&&r.id!==roomId&&!(myUid&&r.ownerUid===myUid));
  if(!rooms.length){el.innerHTML='<div class="room-empty">No open rooms.</div>';return;}
  el.innerHTML='';
  rooms.forEach(r=>{
    const row=document.createElement('div');row.className='room-row';
    row.innerHTML=`<span class="room-code">${r.id}</span><button class="join-r" onclick="joinPublicRoom('${r.id}')">JOIN</button>`;
    el.appendChild(row);
  });
};
window.joinPublicRoom=async function(id){await doJoin(id);};

// ── Waiting room ──────────────────────────────────────────────
let waitUnsub=null;
function enterWaiting(){
  document.getElementById('wait-code-lbl').textContent='ROOM: '+roomId;
  show('screen-waiting');
  if(waitUnsub){waitUnsub();waitUnsub=null;}
  waitUnsub=onValue(ref(db,`rooms2v2/${roomId}/players`),snap=>{
    players=snap.val()||{};
    updateSlots(players);
    const n=Object.keys(players).length;
    document.getElementById('waiting-status').textContent=n+'/4 players joined. '+(n<4?'Waiting...':'Starting!');
    if(n===4){
      if(waitUnsub){waitUnsub();waitUnsub=null;}
      if(publicInterval){clearInterval(publicInterval);remove(ref(db,`public2v2/${roomId}`));}
      beginGame();
    }
  });
}

function updateSlots(pl){
  const myUid=currentUser?.uid;
  ['p1','p2','p3','p4'].forEach(r=>{
    const el=document.getElementById('slot-'+r);
    const p=pl[r];
    if(!p){el.textContent='— waiting';el.className='player-slot empty';}
    else if(p.uid===myUid||r===myRole){el.textContent=p.nick+' (YOU)';el.className='player-slot me';}
    else{el.textContent=p.nick;el.className='player-slot other';}
  });
}

window.leaveWaiting=function(){
  if(waitUnsub){waitUnsub();waitUnsub=null;}
  if(roomId&&myRole){
    remove(ref(db,`rooms2v2/${roomId}/players/${myRole}`));
    if(myRole==='p1')remove(rRef(roomId));
  }
  if(publicInterval){clearInterval(publicInterval);}
  roomId=null;myRole=null;
  show('screen-lobby');setStatus('');
};

// ── Game ──────────────────────────────────────────────────────
let unsubState=null,unsubSig=null,unsubChat=null;
let unsubIn={p1:null,p2:null,p3:null,p4:null};

async function beginGame(){
  const snap=await get(ref(db,`rooms2v2/${roomId}/players`));
  players=snap.val()||{};

  scoreL=0;scoreR=0;rematchVotes=0;
  leftY=H/2-PH/2;rightY=H/2-PH/2;
  inputL=0;inputR=0;
  remoteInputs={p1:0,p2:0,p3:0,p4:0};
  ball=mkBall(1);paused=true;running=true;

  document.getElementById('score-l').textContent='0';
  document.getElementById('score-r').textContent='0';
  document.getElementById('chat-msgs').innerHTML='';

  const nameL=esc((players.p1?.nick||'?')+' + '+(players.p2?.nick||'?'));
  const nameR=esc((players.p3?.nick||'?')+' + '+(players.p4?.nick||'?'));
  document.getElementById('players-l').innerHTML=nameL;
  document.getElementById('players-r').innerHTML=nameR;

  const side=(myRole==='p1'||myRole==='p2')?'LEFT':'RIGHT';
  document.getElementById('role-hint').textContent=`YOU control the ${side} paddle — ↑↓ to move, coordinate with your teammate!`;
  setGS('PRESS SPACE');
  show('screen-game');

  chatSub();
  chatAppend('','Game started! 4 players connected.',false,true);

  // Listen to teammates' directional inputs (-1/0/1)
  ['p1','p2','p3','p4'].forEach(r=>{
    if(unsubIn[r]){unsubIn[r]();unsubIn[r]=null;}
    if(r===myRole)return;
    unsubIn[r]=onValue(inRef(roomId,r),s=>{
      remoteInputs[r]=(s.val()==null)?0:s.val();
    });
  });

  if(myRole!=='p1'){
    if(unsubState){unsubState();unsubState=null;}
    unsubState=onValue(stRef(roomId),s=>{
      const d=s.val();if(!d||!running)return;
      ball={x:d.bx,y:d.by,vx:d.bvx,vy:d.bvy,spd:d.bspd};
      leftY=d.ly;rightY=d.ry;
      if(scoreL!==d.sl||scoreR!==d.sr){scoreL=d.sl;scoreR=d.sr;updScores();}
      paused=d.paused;
      if(d.st!=null)setGS(d.st);
      if(running&&(scoreL>=WIN||scoreR>=WIN)){running=false;cancelAnimationFrame(rafId);showWin();}
    });
  }

  if(unsubSig){unsubSig();unsubSig=null;}
  unsubSig=onValue(ref(db,`rooms2v2/${roomId}/signal`),s=>{
    const v=s.val();if(!v)return;
    if(v.startsWith('rematch-')){
      const n=parseInt(v.split('-')[1]);rematchVotes=n;
      if(n>=4)restartGame();
      else document.getElementById('wbtn-rematch').textContent='('+n+'/4) WAITING...';
    }
    if(v==='bye'){running=false;cancelAnimationFrame(rafId);setGS('A PLAYER LEFT');chatAppend('','A player left.',false,true);}
  });

  cancelAnimationFrame(rafId);lastTick=performance.now();accumulator=0;
  rafId=requestAnimationFrame(loop);
}

function mkBall(d){const a=(Math.random()*0.6-0.3),s=5;return{x:W/2-BS/2,y:H/2-BS/2,vx:d*s*Math.cos(a),vy:s*Math.sin(a),spd:s};}

function loop(now){
  if(!running){draw();return;}
  const dt=Math.min(now-lastTick,100);lastTick=now;

  // Read my directional input: -1, 0, or +1
  const up=keys['ArrowUp']||touch.up;
  const dn=keys['ArrowDown']||touch.dn;
  const myDir=(up?-1:0)+(dn?1:0); // -1, 0, or +1

  // Publish my direction to Firebase
  set(inRef(roomId,myRole),myDir);

  // Combine my input with teammate's for the shared paddle
  if(myRole==='p1'||myRole==='p2'){
    const teamDir=myDir+(myRole==='p1'?remoteInputs.p2:remoteInputs.p1);
    inputL=Math.max(-1,Math.min(1,teamDir)); // clamp to [-1,1]
  } else {
    const teamDir=myDir+(myRole==='p3'?remoteInputs.p4:remoteInputs.p3);
    inputR=Math.max(-1,Math.min(1,teamDir));
  }

  if(!paused){accumulator+=dt;while(accumulator>=TICK){tick();accumulator-=TICK;}}
  draw();
  rafId=requestAnimationFrame(loop);
}

function tick(){
  // Move paddles — host applies both teams' combined inputs
  // Non-host: own side moves locally for responsiveness, host state overrides position
  if(myRole==='p1'||myRole==='p2'){
    leftY=Math.max(0,Math.min(H-PH, leftY+inputL*SPEED));
  } else {
    rightY=Math.max(0,Math.min(H-PH, rightY+inputR*SPEED));
  }

  if(myRole!=='p1')return; // only host runs physics

  // Host also moves right paddle using p3+p4 combined remote input
  const hostInputR=remoteInputs.p3+remoteInputs.p4;
  rightY=Math.max(0,Math.min(H-PH, rightY+Math.max(-1,Math.min(1,hostInputR))*SPEED));

  ball.x+=ball.vx;ball.y+=ball.vy;
  if(ball.y<=0){ball.y=0;ball.vy=Math.abs(ball.vy);}
  if(ball.y+BS>=H){ball.y=H-BS;ball.vy=-Math.abs(ball.vy);}
  function hit(px,py,side){
    if(ball.x+BS>px&&ball.x<px+PW&&ball.y+BS>py&&ball.y<py+PH){
      const rel=(ball.y+BS/2-py)/PH,ang=(rel-.5)*Math.PI*.55;
      ball.spd=Math.min(ball.spd+.25,15);
      ball.vx=side*ball.spd*Math.cos(ang);ball.vy=ball.spd*Math.sin(ang);
      ball.x=side===1?px+PW:px-BS;
    }
  }
  hit(20,leftY,1);hit(W-20-PW,rightY,-1);
  if(ball.x+BS<0){scoreR++;if(!checkWin()){ball=mkBall(1);paused=true;setGS('PRESS SPACE');}updScores();}
  if(ball.x>W)   {scoreL++;if(!checkWin()){ball=mkBall(-1);paused=true;setGS('PRESS SPACE');}updScores();}
  set(stRef(roomId),{bx:ball.x,by:ball.y,bvx:ball.vx,bvy:ball.vy,bspd:ball.spd,ly:leftY,ry:rightY,sl:scoreL,sr:scoreR,paused,st:document.getElementById('g-status').textContent});
}

function togglePause(){
  if(!running)return;paused=!paused;setGS(paused?'PAUSED':'');
  if(myRole==='p1')set(stRef(roomId),{bx:ball.x,by:ball.y,bvx:ball.vx,bvy:ball.vy,bspd:ball.spd,ly:leftY,ry:rightY,sl:scoreL,sr:scoreR,paused,st:paused?'PAUSED':''});
}
function updScores(){document.getElementById('score-l').textContent=scoreL;document.getElementById('score-r').textContent=scoreR;}
function checkWin(){
  if(scoreL>=WIN||scoreR>=WIN){
    running=false;cancelAnimationFrame(rafId);
    if(myRole==='p1'){
      set(stRef(roomId),{bx:W/2,by:H/2,bvx:0,bvy:0,bspd:0,ly:leftY,ry:rightY,sl:scoreL,sr:scoreR,paused:true,st:''});
    }
    showWin();return true;
  }return false;
}
function showWin(){
  const iWon=(myRole==='p1'||myRole==='p2')?(scoreL>=WIN):(scoreR>=WIN);
  document.getElementById('win-title').textContent=iWon?'YOUR TEAM WINS!':'YOUR TEAM LOSES!';
  document.getElementById('win-score').textContent=scoreL+' — '+scoreR;
  document.getElementById('wbtn-rematch').textContent='REMATCH';
  show('screen-win');
}
function restartGame(){
  scoreL=0;scoreR=0;rematchVotes=0;
  leftY=H/2-PH/2;rightY=H/2-PH/2;
  inputL=0;inputR=0;remoteInputs={p1:0,p2:0,p3:0,p4:0};
  ball=mkBall(1);paused=true;running=true;
  document.getElementById('score-l').textContent='0';
  document.getElementById('score-r').textContent='0';
  document.getElementById('wbtn-rematch').textContent='REMATCH';
  setGS('PRESS SPACE');show('screen-game');
  update(ref(db,`rooms2v2/${roomId}`),{signal:null});
  cancelAnimationFrame(rafId);lastTick=performance.now();accumulator=0;
  rafId=requestAnimationFrame(loop);
}
window.requestRematch=function(){
  rematchVotes++;
  update(ref(db,`rooms2v2/${roomId}`),{signal:'rematch-'+rematchVotes});
  if(rematchVotes>=4)restartGame();
  else document.getElementById('wbtn-rematch').textContent='('+rematchVotes+'/4) WAITING...';
};
window.leaveGame=function(){
  running=false;cancelAnimationFrame(rafId);
  Object.values(unsubIn).forEach(u=>u&&u());
  [unsubState,unsubSig,unsubChat,waitUnsub].forEach(u=>u&&u());
  if(roomId)update(ref(db,`rooms2v2/${roomId}`),{signal:'bye'});
  clearInterval(publicInterval);
  show('screen-lobby');setStatus('');
};

// ── Chat ──────────────────────────────────────────────────────
let lastCK=null;
function chatSub(){
  if(unsubChat){unsubChat();unsubChat=null;}lastCK=null;
  const t0=Date.now();
  unsubChat=onValue(chRef(roomId),s=>{
    if(!s.exists())return;
    s.forEach(c=>{
      const k=c.key,d=c.val();
      if(lastCK&&k<=lastCK)return;lastCK=k;
      if((d.ts||0)<t0-2000)return;
      chatAppend(d.sender,d.text,d.uid===currentUser?.uid);
    });
  });
}
function chatAppend(sender,text,isMe,sys=false){
  const box=document.getElementById('chat-msgs');
  const div=document.createElement('div');div.className='chat-msg'+(sys?' sys':'');
  if(!sys)div.innerHTML=`<div class="sndr${isMe?' me':''}">${esc(sender)}</div><div class="txt">${esc(text)}</div>`;
  else div.innerHTML=`<div class="txt">${esc(text)}</div>`;
  box.appendChild(div);box.scrollTop=box.scrollHeight;
}
window.sendChat=function(){
  const inp=document.getElementById('chat-in');const t=inp.value.trim();
  if(!t||!roomId)return;inp.value='';
  push(chRef(roomId),{sender:myNick,text:t,uid:currentUser?.uid||'anon',ts:Date.now()});
};
document.getElementById('chat-in').addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();window.sendChat();}});

// ── Draw ──────────────────────────────────────────────────────
const canvas=document.getElementById('canvas');
const ctx=canvas.getContext('2d');

function draw(){
  ctx.fillStyle='#000';ctx.fillRect(0,0,W,H);
  ctx.setLineDash([8,12]);ctx.strokeStyle='#333';ctx.lineWidth=2;
  ctx.beginPath();ctx.moveTo(W/2,0);ctx.lineTo(W/2,H);ctx.stroke();ctx.setLineDash([]);

  // One solid paddle per side
  ctx.fillStyle='#fff';
  ctx.fillRect(20,leftY,PW,PH);
  ctx.fillRect(W-20-PW,rightY,PW,PH);

  if(ball){ctx.fillStyle='#fff';ctx.fillRect(Math.round(ball.x),Math.round(ball.y),BS,BS);}
}
draw();
</script>
